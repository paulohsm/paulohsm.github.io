<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendário Contínuo | Paulo HSM</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --grid-line: #1a1a1a;
            --text: #e0e0e0;
            --accent: #0366d6;
            --today-bg: rgba(3, 102, 214, 0.3);
            --cell-height: 65px; 
        }

        * { box-sizing: border-box; }
        body { margin: 0; background-color: #000; color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }

        .header-days {
            display: grid;
            grid-template-columns: 60px 50px repeat(7, 1fr);
            background: #151515;
            border-bottom: 2px solid var(--accent);
            text-align: center;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 10px 0;
            z-index: 2000;
        }

        /* O ANO FIXO NO TOPO */
        .year-overlay {
            position: absolute;
            top: 36px; /* Altura do header-days */
            left: 0;
            width: 60px;
            height: var(--cell-height);
            background: var(--bg);
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid var(--grid-line);
            border-bottom: 1px solid var(--grid-line);
            z-index: 1500;
            pointer-events: none;
        }

        #calendar-viewport {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .week-row {
            display: grid;
            grid-template-columns: 60px 50px repeat(7, 1fr);
            height: var(--cell-height);
            border-bottom: 1px solid var(--grid-line);
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--grid-line);
            font-size: 1rem;
        }

        /* Coluna do ano vazia nas linhas, o overlay cobre o topo */
        .year-spacer { border-right: 2px solid var(--grid-line); }

        .month-col { color: #888; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .weekend { background: #0d0d0d; }
        .today { background: var(--today-bg); box-shadow: inset 0 0 0 2px var(--accent); }

        .btn-today {
            position: absolute; bottom: 25px; right: 25px;
            background: var(--accent); color: white; border: none;
            padding: 12px 20px; border-radius: 30px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 2000;
            cursor: pointer;
        }

        #top-sentinel, #bottom-sentinel { height: 2px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-days">
            <div>ANO</div><div>MÊS</div><div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
        </div>

        <div class="year-overlay" id="fixed-year-label">2026</div>

        <div id="calendar-viewport">
            <div id="top-sentinel"></div>
            <div id="calendar-content"></div>
            <div id="bottom-sentinel"></div>
        </div>

        <button class="btn-today" onclick="goToToday()">HOJE</button>
    </div>

    <script>
        const months = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        const content = document.getElementById('calendar-content');
        const viewport = document.getElementById('calendar-viewport');
        const yearLabel = document.getElementById('fixed-year-label');
        
        const now = new Date();
        const pivotDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - now.getDay());
        
        let topOffset = 0;
        let bottomOffset = 0;

        function createWeek(offset, mode) {
            const weekDate = new Date(pivotDate);
            weekDate.setDate(pivotDate.getDate() + (offset * 7));
            
            const row = document.createElement('div');
            row.className = 'week-row';
            // Guardamos o ano de referência do domingo desta semana
            row.dataset.year = weekDate.getFullYear();

            // 1. Coluna Ano (Vazia)
            const yearSpacer = document.createElement('div');
            yearSpacer.className = 'cell year-spacer';
            row.appendChild(yearSpacer);

            // 2. Coluna Mês
            const monthCell = document.createElement('div');
            monthCell.className = 'cell month-col';
            for(let i=0; i<7; i++) {
                let d = new Date(weekDate);
                d.setDate(weekDate.getDate() + i);
                if (d.getDate() === 1) monthCell.innerText = months[d.getMonth()];
            }
            row.appendChild(monthCell);

            // 3. Dias
            for(let i=0; i<7; i++) {
                const day = new Date(weekDate);
                day.setDate(weekDate.getDate() + i);
                const cell = document.createElement('div');
                cell.className = 'cell' + (i === 0 || i === 6 ? ' weekend' : '');
                if (day.toDateString() === now.toDateString()) cell.classList.add('today');
                cell.innerText = day.getDate();
                row.appendChild(cell);
            }

            if (mode === 'append') content.appendChild(row);
            else content.insertBefore(row, content.firstChild);
        }

        // ATUALIZAÇÃO DO ANO: Otimizada para não travar
        viewport.addEventListener('scroll', () => {
            // Pegamos a primeira linha visível
            // Como as linhas têm altura fixa de 65px, podemos estimar a linha atual
            const scrollTop = viewport.scrollTop;
            const index = Math.floor(scrollTop / 65);
            const rows = content.getElementsByClassName('week-row');
            
            if (rows[index]) {
                const yearInView = rows[index].dataset.year;
                if (yearLabel.innerText !== yearInView) {
                    yearLabel.innerText = yearInView;
                }
            }
        });

        function load(dir) {
            const hPre = content.offsetHeight;
            const sPre = viewport.scrollTop;
            for(let i=0; i<15; i++) {
                if(dir === 'down') { bottomOffset++; createWeek(bottomOffset, 'append'); }
                else { topOffset--; createWeek(topOffset, 'prepend'); }
            }
            if(dir === 'up') viewport.scrollTop = sPre + (content.offsetHeight - hPre);
        }

        function goToToday() {
            content.innerHTML = "";
            topOffset = 0; bottomOffset = 0;
            createWeek(0, 'append');
            for(let i=0; i<20; i++) load('down');
            const todayCell = document.querySelector('.today');
            if(todayCell) todayCell.scrollIntoView({block:'center'});
        }

        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if(e.isIntersecting) {
                    if(e.target.id === 'bottom-sentinel') load('down');
                    if(e.target.id === 'top-sentinel') load('up');
                }
            });
        }, { root: viewport, rootMargin: '800px' });

        obs.observe(document.getElementById('top-sentinel'));
        obs.observe(document.getElementById('bottom-sentinel'));

        // Init
        createWeek(0, 'append');
        for(let i=0; i<20; i++) load('down');
        setTimeout(() => {
            const today = document.querySelector('.today');
            if(today) today.scrollIntoView({block:'center'});
        }, 100);
    </script>
</body>
</html>
