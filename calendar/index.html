<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendário Contínuo | Continuous Calendar</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --grid-line: #1a1a1a;
            --text: #e0e0e0;
            --accent: #0366d6;
            --today-bg: rgba(3, 102, 214, 0.3);
            --today-border: #0366d6;
            --cell-height: 65px; 
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100dvh;
            margin: 0;
            background-color: #000;
            color: var(--text);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100%;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
            position: relative;
        }

        .header-days {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 55px 55px repeat(7, 1fr);
            background: #151515;
            border-bottom: 2px solid var(--accent);
            text-align: center;
            font-size: 0.6rem;
            font-weight: bold;
            padding: 10px 0;
            z-index: 1000;
        }

        #calendar-viewport {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .year-section { position: relative; width: 100%; }

        .year-label {
            position: sticky;
            top: 0;
            left: 0;
            width: 55px;
            height: var(--cell-height);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--accent);
            font-weight: bold;
            font-size: 0.85rem;
            z-index: 50;
            float: left;
        }

        .week-row {
            display: grid;
            grid-template-columns: 55px 55px repeat(7, 1fr);
            border-bottom: 1px solid var(--grid-line);
            height: var(--cell-height);
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--grid-line);
            font-size: 1rem;
        }

        .cell.month-col { font-size: 0.7rem; color: #888; font-weight: bold; text-transform: uppercase; }
        .cell.weekend { background: #0d0d0d; }
        .cell.today { background: var(--today-bg); box-shadow: inset 0 0 0 2px var(--today-border); }

        .btn-today {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 2000;
            cursor: pointer;
            font-size: 0.8rem;
        }

        #top-sentinel, #bottom-sentinel { height: 1px; width: 100%; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-days">
            <div>ANO</div>
            <div>MÊS</div>
            <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
        </div>

        <div id="calendar-viewport">
            <div id="top-sentinel"></div>
            <div id="calendar-content"></div>
            <div id="bottom-sentinel"></div>
        </div>

        <button class="btn-today" onclick="goToToday()">HOJE</button>
    </div>

    <script>
        const i18n = {
            pt: { months: ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"] },
            en: { months: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"] }
        };

        const content = document.getElementById('calendar-content');
        const viewport = document.getElementById('calendar-viewport');
        const lang = navigator.language.startsWith('pt') ? 'pt' : 'en';
        const t = i18n[lang];

        // REFERÊNCIA FIXA: Domingo da semana atual
        const now = new Date();
        const pivotDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - now.getDay());
        
        let topOffset = 0;    // Semanas para trás
        let bottomOffset = 0; // Semanas para frente

        function createWeek(weekOffset, mode) {
            // Calcula a data exata do domingo daquela semana específica
            const weekDate = new Date(pivotDate);
            weekDate.setDate(pivotDate.getDate() + (weekOffset * 7));
            
            const year = weekDate.getFullYear();
            let yearSection = document.getElementById(`year-${year}`);

            if (!yearSection) {
                yearSection = document.createElement('div');
                yearSection.id = `year-${year}`;
                yearSection.className = 'year-section';
                const label = document.createElement('div');
                label.className = 'year-label';
                label.innerText = year;
                yearSection.appendChild(label);

                if (mode === 'append') content.appendChild(yearSection);
                else content.insertBefore(yearSection, content.firstChild);
            }

            const row = document.createElement('div');
            row.className = 'week-row';
            
            // 1. Coluna Ano (vazia, o sticky label ocupa o espaço)
            row.appendChild(document.createElement('div')).className = 'cell';

            // 2. Coluna Mês (Aparece apenas se a semana contiver o dia 1)
            const monthCell = document.createElement('div');
            monthCell.className = 'cell month-col';
            for (let i = 0; i < 7; i++) {
                let checkDate = new Date(weekDate);
                checkDate.setDate(weekDate.getDate() + i);
                if (checkDate.getDate() === 1) {
                    monthCell.innerText = t.months[checkDate.getMonth()];
                }
            }
            row.appendChild(monthCell);

            // 3. Dias da Semana
            for (let i = 0; i < 7; i++) {
                const dayCell = document.createElement('div');
                let d = new Date(weekDate);
                d.setDate(weekDate.getDate() + i);
                
                dayCell.className = 'cell';
                if (i === 0 || i === 6) dayCell.classList.add('weekend');
                if (d.toDateString() === now.toDateString()) dayCell.classList.add('today');
                
                dayCell.innerText = d.getDate();
                row.appendChild(dayCell);
            }

            if (mode === 'append') yearSection.appendChild(row);
            else {
                // Inserção no topo mantendo a ordem das linhas
                const label = yearSection.querySelector('.year-label');
                yearSection.insertBefore(row, label.nextSibling);
            }
        }

        function load(dir) {
            const hPre = content.offsetHeight;
            const sPre = viewport.scrollTop;

            for (let i = 0; i < 15; i++) {
                if (dir === 'down') {
                    bottomOffset++;
                    createWeek(bottomOffset, 'append');
                } else {
                    topOffset--;
                    createWeek(topOffset, 'prepend');
                }
            }

            if (dir === 'up') {
                viewport.scrollTop = sPre + (content.offsetHeight - hPre);
            }
        }

        function goToToday() {
            content.innerHTML = "";
            topOffset = 0;
            bottomOffset = 0;
            createWeek(0, 'append');
            for(let i=0; i<5; i++) load('down');
            setTimeout(() => {
                const target = document.querySelector('.today');
                if(target) target.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }, 50);
        }

        // Infinite Scroll
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    if (entry.target.id === 'bottom-sentinel') load('down');
                    if (entry.target.id === 'top-sentinel') load('up');
                }
            });
        }, { root: viewport, rootMargin: '500px' });

        observer.observe(document.getElementById('top-sentinel'));
        observer.observe(document.getElementById('bottom-sentinel'));

        // Inicialização
        createWeek(0, 'append');
        for(let i=0; i<5; i++) load('down');
        setTimeout(() => {
            const todayCell = document.querySelector('.today');
            if(todayCell) todayCell.scrollIntoView({block:'center'});
        }, 100);

    </script>
</body>
</html>
