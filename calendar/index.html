<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendário Contínuo</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --grid-line: #1a1a1a;
            --text: #e0e0e0;
            --accent: #0366d6;
            --today-bg: rgba(3, 102, 214, 0.3);
            --cell-height: 60px; 
        }

        * { box-sizing: border-box; }
        body { margin: 0; background-color: #000; color: var(--text); font-family: sans-serif; overflow: hidden; }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .header-days {
            display: grid;
            grid-template-columns: 50px 50px repeat(7, 1fr);
            background: #151515;
            border-bottom: 2px solid var(--accent);
            text-align: center;
            font-size: 0.7rem;
            padding: 10px 0;
            z-index: 100;
        }

        #calendar-viewport {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }

        /* O segredo: Uma grade única para o conteúdo todo */
        #calendar-content {
            display: block;
            width: 100%;
        }

        .week-row {
            display: grid;
            grid-template-columns: 50px 50px repeat(7, 1fr);
            height: var(--cell-height);
            border-bottom: 1px solid var(--grid-line);
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--grid-line);
            font-size: 1rem;
        }

        .year-col { color: var(--accent); font-weight: bold; font-size: 0.8rem; border-right: 2px solid var(--grid-line); }
        .month-col { color: #888; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .weekend { background: #0d0d0d; }
        .today { background: var(--today-bg); box-shadow: inset 0 0 0 2px var(--today-border); font-weight: bold; }

        .btn-today {
            position: absolute; bottom: 20px; right: 20px;
            background: var(--accent); color: white; border: none;
            padding: 12px 20px; border-radius: 30px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 200;
        }

        #top-sentinel, #bottom-sentinel { height: 1px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-days">
            <div>ANO</div><div>MÊS</div><div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
        </div>

        <div id="calendar-viewport">
            <div id="top-sentinel"></div>
            <div id="calendar-content"></div>
            <div id="bottom-sentinel"></div>
        </div>

        <button class="btn-today" onclick="goToToday()">HOJE</button>
    </div>

    <script>
        const months = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        const content = document.getElementById('calendar-content');
        const viewport = document.getElementById('calendar-viewport');
        
        const now = new Date();
        const pivotDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - now.getDay());
        
        let topOffset = 0;
        let bottomOffset = 0;

        function createWeek(offset, mode) {
            const weekDate = new Date(pivotDate);
            weekDate.setDate(pivotDate.getDate() + (offset * 7));
            
            const row = document.createElement('div');
            row.className = 'week-row';

            // Coluna do Ano: Só mostra se for a primeira semana do ano ou se o ano mudar
            const yearCell = document.createElement('div');
            yearCell.className = 'cell year-col';
            const yearOfSunday = weekDate.getFullYear();
            
            // Lógica para mostrar o ano apenas na transição
            let showYear = false;
            for(let i=0; i<7; i++) {
                let d = new Date(weekDate);
                d.setDate(weekDate.getDate() + i);
                if (d.getMonth() === 0 && d.getDate() === 1) showYear = true;
            }
            // Se for o offset 0 (semana atual), também mostramos para referência
            if (offset === topOffset && mode === 'prepend') showYear = true;

            yearCell.innerText = (weekDate.getDate() <= 7 && weekDate.getMonth() === 0) || offset === 0 ? yearOfSunday : "";
            row.appendChild(yearCell);

            // Coluna do Mês: Mostra se o dia 1 estiver na semana
            const monthCell = document.createElement('div');
            monthCell.className = 'cell month-col';
            for(let i=0; i<7; i++) {
                let d = new Date(weekDate);
                d.setDate(weekDate.getDate() + i);
                if (d.getDate() === 1) monthCell.innerText = months[d.getMonth()];
            }
            row.appendChild(monthCell);

            // Dias
            for(let i=0; i<7; i++) {
                const day = new Date(weekDate);
                day.setDate(weekDate.getDate() + i);
                const cell = document.createElement('div');
                cell.className = 'cell' + (i === 0 || i === 6 ? ' weekend' : '');
                if (day.toDateString() === now.toDateString()) cell.classList.add('today');
                cell.innerText = day.getDate();
                row.appendChild(cell);
            }

            if (mode === 'append') content.appendChild(row);
            else content.insertBefore(row, content.firstChild);
        }

        function load(dir) {
            const hPre = content.offsetHeight;
            const sPre = viewport.scrollTop;
            for(let i=0; i<10; i++) {
                if(dir === 'down') { bottomOffset++; createWeek(bottomOffset, 'append'); }
                else { topOffset--; createWeek(topOffset, 'prepend'); }
            }
            if(dir === 'up') viewport.scrollTop = sPre + (content.offsetHeight - hPre);
        }

        function goToToday() {
            content.innerHTML = "";
            topOffset = 0; bottomOffset = 0;
            createWeek(0, 'append');
            for(let i=0; i<10; i++) load('down');
            document.querySelector('.today').scrollIntoView({block:'center'});
        }

        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if(e.isIntersecting) {
                    if(e.target.id === 'bottom-sentinel') load('down');
                    if(e.target.id === 'top-sentinel') load('up');
                }
            });
        }, { root: viewport, rootMargin: '400px' });

        obs.observe(document.getElementById('top-sentinel'));
        obs.observe(document.getElementById('bottom-sentinel'));

        // Início
        createWeek(0, 'append');
        for(let i=0; i<15; i++) load('down');
        setTimeout(() => document.querySelector('.today').scrollIntoView({block:'center'}), 50);
    </script>
</body>
</html>
