<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="page-title">Cronômetro Perpétuo / Perpetual Timeline</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --grid-line: #1a1a1a;
            --text: #e0e0e0;
            --accent: #0366d6;
            --today-bg: rgba(3, 102, 214, 0.2);
            --cell-height: 60px; /* Altura fixa para precisão matemática */
        }

        * { box-sizing: border-box; }
        html, body { height: 100dvh; margin: 0; background: #000; color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }

        .app-container {
            max-width: 480px; margin: 0 auto; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            border-left: 1px solid #222; border-right: 1px solid #222; position: relative;
        }

        /* Linha Guia Central (Invisível, mas serve de referência) */
        .center-guide {
            position: absolute; top: 50%; left: 0; width: 100%; height: 1px;
            background: rgba(255,0,0,0.1); z-index: 2000; pointer-events: none;
        }

        .header-days {
            flex-shrink: 0; display: grid; grid-template-columns: 60px 60px repeat(7, 1fr);
            background: #151515; border-bottom: 2px solid var(--accent);
            text-align: center; font-size: 0.6rem; font-weight: bold; padding: 10px 0; z-index: 1000;
        }

        #viewport { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; }

        /* Colunas Deslizantes */
        .side-columns {
            position: absolute; top: 0; left: 0; width: 120px; height: 100%; pointer-events: none; z-index: 10;
        }

        .week-row {
            display: grid; grid-template-columns: 60px 60px repeat(7, 1fr);
            height: var(--cell-height); border-bottom: 1px solid var(--grid-line);
        }

        .cell { display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--grid-line); font-size: 1rem; }
        .cell.day-cell { position: relative; }
        .cell.weekend { background: #0d0d0d; }
        .cell.today { background: var(--today-bg); outline: 1px solid var(--accent); }
        .day-01 { font-weight: bold; color: #fff; text-decoration: underline; }

        /* Estilo dos Indicadores Deslizantes */
        .sliding-label {
            position: absolute; width: 60px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; background: var(--bg); border-right: 1px solid var(--grid-line);
        }
        .year-label { color: var(--accent); font-size: 0.9rem; left: 0; }
        .month-label { color: #888; font-size: 0.75rem; text-transform: uppercase; left: 60px; }

        .btn-today {
            position: absolute; bottom: 20px; right: 20px;
            background: var(--accent); color: white; border: none; padding: 12px 20px;
            border-radius: 25px; font-weight: bold; z-index: 2000; cursor: pointer;
        }

        #content { position: relative; }
        #top-sentinel, #bottom-sentinel { height: 1px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="center-guide"></div>
        <div class="header-days">
            <div data-i18n="year">ANO</div><div data-i18n="month">MÊS</div>
            <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
        </div>

        <div id="viewport">
            <div id="top-sentinel"></div>
            <div id="content"></div>
            <div id="bottom-sentinel"></div>
        </div>

        <button class="btn-today" onclick="goToToday()" data-i18n="btnToday">HOJE</button>
    </div>

    <script>
        const i18n = {
            pt: { year: "ANO", month: "MÊS", btnToday: "HOJE", months: ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"] },
            en: { year: "YEAR", month: "MONTH", btnToday: "TODAY", months: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"] }
        };

        const content = document.getElementById('content');
        const viewport = document.getElementById('viewport');
        const lang = navigator.language.startsWith('pt') ? 'pt' : 'en';
        const t = i18n[lang];

        const CELL_H = 60;
        let today = new Date();
        // Referência: Domingo da semana de hoje
        let refDate = new Date(today.getFullYear(), today.getMonth(), today.getDate() - today.getDay());
        
        let topWeeks = 0; // semanas acima da referência
        let bottomWeeks = 0; // semanas abaixo da referência

        function createRow(weekOffset) {
            const row = document.createElement('div');
            row.className = 'week-row';
            row.dataset.offset = weekOffset;

            // Espaçadores para Ano e Mês
            row.appendChild(document.createElement('div')).className = 'cell';
            row.appendChild(document.createElement('div')).className = 'cell';

            let rowDate = new Date(refDate.getTime() + weekOffset * 7 * 24 * 60 * 60 * 1000);

            for(let i=0; i<7; i++) {
                let d = new Date(rowDate.getTime() + i * 24 * 60 * 60 * 1000);
                const cell = document.createElement('div');
                cell.className = 'cell day-cell' + (i===0 || i===6 ? ' weekend' : '');
                
                if(d.toDateString() === new Date().toDateString()) cell.classList.add('today');
                
                let text = d.getDate();
                if(text === 1) cell.innerHTML = `<span class="day-01">${text}</span>`;
                else cell.innerText = text;

                row.appendChild(cell);
            }

            return row;
        }

        function syncSideColumns() {
            // Remove labels antigos que saíram da área visível
            document.querySelectorAll('.sliding-label').forEach(l => l.remove());

            const viewTop = viewport.scrollTop;
            const viewHeight = viewport.offsetHeight;
            const midPoint = viewTop + (viewHeight / 2);

            // Calcular a data exata no centro da tela
            const weeksFromRef = midPoint / CELL_H;
            const centerTime = refDate.getTime() + (weeksFromRef * 7 * 24 * 60 * 60 * 1000);
            const centerDate = new Date(centerTime);

            // 1. Posicionamento do Mês
            // Calculamos a posição do dia 1 do mês atual e do próximo
            const firstOfCurrent = new Date(centerDate.getFullYear(), centerDate.getMonth(), 1);
            const firstOfNext = new Date(centerDate.getFullYear(), centerDate.getMonth() + 1, 1);

            [firstOfCurrent, firstOfNext].forEach(d => {
                const dTime = d.getTime();
                const dWeeks = (dTime - refDate.getTime()) / (7 * 24 * 60 * 60 * 1000);
                // O ajuste de -0.5 é porque o "centro" da célula do dia 1 é onde o mês se alinha
                const mPos = (dWeeks * CELL_H) + (d.getDay() === 0 ? 0 : 0); 
                
                const mLabel = document.createElement('div');
                mLabel.className = 'sliding-label month-label';
                mLabel.style.top = `${mPos}px`;
                mLabel.style.height = `${CELL_H}px`;
                mLabel.innerText = t.months[d.getMonth()];
                content.appendChild(mLabel);
            });

            // 2. Posicionamento do Ano
            const firstOfYear = new Date(centerDate.getFullYear(), 0, 1);
            const firstOfNextYear = new Date(centerDate.getFullYear() + 1, 0, 1);

            [firstOfYear, firstOfNextYear].forEach(d => {
                const yWeeks = (d.getTime() - refDate.getTime()) / (7 * 24 * 60 * 60 * 1000);
                const yPos = (yWeeks * CELL_H);
                
                const yLabel = document.createElement('div');
                yLabel.className = 'sliding-label year-label';
                yLabel.style.top = `${yPos}px`;
                yLabel.style.height = `${CELL_H}px`;
                yLabel.innerText = d.getFullYear();
                content.appendChild(yLabel);
            });
        }

        function load(dir) {
            for(let i=0; i<20; i++) {
                if(dir === 'down') {
                    content.appendChild(createRow(bottomWeeks));
                    bottomWeeks++;
                } else {
                    topWeeks--;
                    const row = createRow(topWeeks);
                    content.insertBefore(row, content.firstChild);
                    viewport.scrollTop += CELL_H;
                }
            }
        }

        viewport.addEventListener('scroll', () => {
            if(viewport.scrollTop + viewport.offsetHeight > content.offsetHeight - 500) load('down');
            if(viewport.scrollTop < 500) load('up');
            syncSideColumns();
        });

        function goToToday() {
            content.innerHTML = "";
            topWeeks = 0; bottomWeeks = 0;
            refDate = new Date(today.getFullYear(), today.getMonth(), today.getDate() - today.getDay());
            load('down');
            viewport.scrollTop = (content.offsetHeight / 2) - (viewport.offsetHeight / 2);
            syncSideColumns();
        }

        // Inicialização
        load('down');
        // Centraliza hoje
        viewport.scrollTop = 0;
        syncSideColumns();

        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = t[el.getAttribute('data-i18n')];
        });
    </script>
</body>
</html>
