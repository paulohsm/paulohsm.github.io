<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="page-title">Calendário Contínuo / Continuous Calendar</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --grid-line: #1a1a1a;
            --text: #e0e0e0;
            --accent: #0366d6;
            --today-bg: rgba(3, 102, 214, 0.3);
            --today-border: #0366d6;
            --cell-height: 65px; 
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100dvh;
            margin: 0;
            background-color: #000;
            color: var(--text);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100%;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
            position: relative;
        }

        .header-days {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 55px 55px repeat(7, 1fr);
            background: #151515;
            border-bottom: 2px solid var(--accent);
            text-align: center;
            font-size: 0.6rem;
            font-weight: bold;
            padding: 10px 0;
            z-index: 1000;
        }

        #calendar-viewport {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .year-section { position: relative; display: block; width: 100%; }
        .year-section::after { content: ""; display: table; clear: both; }

        .year-label {
            position: sticky;
            top: 0;
            left: 0;
            width: 55px;
            height: var(--cell-height);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--accent);
            font-weight: bold;
            font-size: 0.85rem;
            z-index: 50;
            float: left;
        }

        .week-row {
            display: grid;
            grid-template-columns: 55px 55px repeat(7, 1fr);
            border-bottom: 1px solid var(--grid-line);
            height: var(--cell-height);
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--grid-line);
            font-size: 1rem;
        }

        .cell.month-col { font-size: 0.7rem; color: #888; font-weight: bold; text-transform: uppercase; }
        .cell.weekend { background: #0d0d0d; }
        .cell.today { background: var(--today-bg); box-shadow: inset 0 0 0 2px var(--today-border); }

        /* Botão Hoje */
        .btn-today {
            position: absolute;
            bottom: 20px;
            left: 70px; /* Ajustado para não colidir com o ano se necessário */
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 2000;
            cursor: pointer;
            font-size: 0.8rem;
        }

        #top-sentinel, #bottom-sentinel { height: 2px; width: 100%; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-days">
            <div data-i18n="year">ANO</div>
            <div data-i18n="month">MÊS</div>
            <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
        </div>

        <div id="calendar-viewport">
            <div id="top-sentinel"></div>
            <div id="calendar-content"></div>
            <div id="bottom-sentinel"></div>
        </div>

        <button class="btn-today" onclick="goToToday()" data-i18n="btnToday">HOJE</button>
    </div>

    <script>
        const i18n = {
            pt: { year: "ANO", month: "MÊS", btnToday: "HOJE", months: ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"] },
            en: { year: "YEAR", month: "MONTH", btnToday: "TODAY", months: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"] }
        };

        const content = document.getElementById('calendar-content');
        const viewport = document.getElementById('calendar-viewport');
        const lang = navigator.language.startsWith('pt') ? 'pt' : 'en';
        const t = i18n[lang];

        // Normalização: Começamos sempre no Domingo da semana atual
        let today = new Date();
        let startOfWeek = new Date(today.getFullYear(), today.getMonth(), today.getDate() - today.getDay());
        
        let topDate = new Date(startOfWeek);
        let bottomDate = new Date(startOfWeek);

        function createWeek(date, mode) {
            const year = date.getFullYear();
            let yearSection = document.getElementById(`year-${year}`);

            if (!yearSection) {
                yearSection = document.createElement('div');
                yearSection.id = `year-${year}`;
                yearSection.className = 'year-section';
                const label = document.createElement('div');
                label.className = 'year-label';
                label.innerText = year;
                yearSection.appendChild(label);

                if (mode === 'append') content.appendChild(yearSection);
                else content.insertBefore(yearSection, content.firstChild);
            }

            const row = document.createElement('div');
            row.className = 'week-row';
            row.appendChild(document.createElement('div')).className = 'cell'; // Spacer Ano

            const monthCell = document.createElement('div');
            monthCell.className = 'cell month-col';
            
            let temp = new Date(date);
            for(let j=0; j<7; j++) {
                let check = new Date(date.getTime() + j * 24 * 60 * 60 * 1000);
                if(check.getDate() === 1) monthCell.innerText = t.months[check.getMonth()];
            }
            row.appendChild(monthCell);

            for(let i=0; i<7; i++) {
                const day = document.createElement('div');
                let d = new Date(date.getTime() + i * 24 * 60 * 60 * 1000);
                day.className = 'cell' + (i===0 || i===6 ? ' weekend' : '');
                if(d.toDateString() === new Date().toDateString()) day.classList.add('today');
                day.innerText = d.getDate();
                row.appendChild(day);
            }

            if (mode === 'append') yearSection.appendChild(row);
            else {
                const rows = yearSection.querySelectorAll('.week-row');
                yearSection.insertBefore(row, rows[0] || null);
            }
        }

        function load(dir) {
            const hPre = content.offsetHeight;
            const sPre = viewport.scrollTop;

            for(let i=0; i<12; i++) {
                if(dir === 'down') {
                    bottomDate.setDate(bottomDate.getDate() + 7);
                    createWeek(new Date(bottomDate), 'append');
                } else {
                    topDate.setDate(topDate.getDate() - 7);
                    createWeek(new Date(topDate), 'prepend');
                }
            }

            if(dir === 'up') viewport.scrollTop = sPre + (content.offsetHeight - hPre);
        }

        function goToToday() {
            content.innerHTML = "";
            topDate = new Date(startOfWeek);
            bottomDate = new Date(startOfWeek);
            createWeek(new Date(topDate), 'append');
            for(let i=0; i<8; i++) load('down');
            setTimeout(() => {
                const target = document.querySelector('.today');
                if(target) target.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }, 50);
        }

        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if(e.isIntersecting) {
                    if(e.target.id === 'bottom-sentinel') load('down');
                    if(e.target.id === 'top-sentinel') load('up');
                }
            });
        }, { root: viewport, rootMargin: '300px' });

        obs.observe(document.getElementById('top-sentinel'));
        obs.observe(document.getElementById('bottom-sentinel'));

        createWeek(new Date(topDate), 'append');
        for(let i=0; i<10; i++) load('down');
        setTimeout(() => document.querySelector('.today').scrollIntoView({block:'center'}), 100);

        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = t[el.getAttribute('data-i18n')];
        });
    </script>
</body>
</html>
