<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="page-title">Calendário Contínuo / Continuous Calendar</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --grid-line: #1a1a1a;
            --text: #e0e0e0;
            --accent: #0366d6;
            --today-bg: rgba(3, 102, 214, 0.2);
            --today-border: #0366d6;
            /* Altura calculada para exibir ~2 meses (aprox 9 semanas) */
            --cell-height: 65px; 
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100dvh;
            margin: 0;
            background-color: #000; /* Fundo externo à tabela */
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        /* Container Principal Centralizado (Estilo Mobile no PC) */
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100%;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }

        /* Cabeçalho de Dias da Semana */
        .header-days {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 50px 50px repeat(7, 1fr);
            background: #151515;
            border-bottom: 2px solid var(--accent);
            text-align: center;
            font-size: 0.6rem;
            font-weight: bold;
            padding: 10px 0;
            z-index: 100;
        }

        #calendar-viewport {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Grupo de Mês (Container para o Sticky) */
        .month-group {
            position: relative;
        }

        .week-row {
            display: grid;
            grid-template-columns: 50px 50px repeat(7, 1fr);
            border-bottom: 1px solid var(--grid-line);
            height: var(--cell-height);
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--grid-line);
            font-size: 1rem;
        }

        /* Colunas Fixas com Sticky */
        .sticky-col {
            position: sticky;
            top: 0;
            height: var(--cell-height);
            z-index: 10;
            background: var(--bg);
            font-weight: bold;
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
        }

        .month-label { color: #888; }

        .cell.weekend { background: #0d0d0d; }
        .cell.today { 
            background: var(--today-bg);
            font-weight: bold;
            box-shadow: inset 0 0 0 2px var(--today-border);
        }

        #top-sentinel, #bottom-sentinel { height: 1px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-days">
            <div data-i18n="year">ANO</div>
            <div data-i18n="month">MÊS</div>
            <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
        </div>

        <div id="calendar-viewport">
            <div id="top-sentinel"></div>
            <div id="calendar-content"></div>
            <div id="bottom-sentinel"></div>
        </div>
    </div>

    <script>
        const i18n = {
            pt: { year: "ANO", month: "MÊS", months: ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"] },
            en: { year: "YEAR", month: "MONTH", months: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"] }
        };

        const content = document.getElementById('calendar-content');
        const viewport = document.getElementById('calendar-viewport');
        const lang = navigator.language.startsWith('pt') ? 'pt' : 'en';
        const t = i18n[lang];

        let topDate = new Date();
        topDate.setDate(topDate.getDate() - topDate.getDay());
        let bottomDate = new Date(topDate);

        function createWeek(date, mode) {
            const row = document.createElement('div');
            row.className = 'week-row';

            // Ano Sticky (só aparece se for a primeira semana do mês/ano)
            const yearCell = document.createElement('div');
            yearCell.className = 'cell sticky-col';
            if (date.getDate() <= 7 && date.getMonth() === 0) yearCell.innerText = date.getFullYear();
            row.appendChild(yearCell);

            // Mês Sticky
            const monthCell = document.createElement('div');
            monthCell.className = 'cell sticky-col month-label';
            if (date.getDate() <= 7) monthCell.innerText = t.months[date.getMonth()];
            row.appendChild(monthCell);

            let temp = new Date(date);
            for(let i=0; i<7; i++) {
                const day = document.createElement('div');
                day.className = 'cell' + (i===0 || i===6 ? ' weekend' : '');
                if(temp.toDateString() === new Date().toDateString()) day.classList.add('today');
                day.innerText = temp.getDate();
                row.appendChild(day);
                temp.setDate(temp.getDate() + 1);
            }

            if(mode === 'append') content.appendChild(row);
            else content.insertBefore(row, content.firstChild);
        }

        function load(dir) {
            const currentTop = viewport.scrollTop;
            const currentHeight = content.offsetHeight;

            for(let i=0; i<15; i++) {
                if(dir === 'down') {
                    bottomDate.setDate(bottomDate.getDate() + 7);
                    createWeek(bottomDate, 'append');
                } else {
                    topDate.setDate(topDate.getDate() - 7);
                    createWeek(topDate, 'prepend');
                }
            }

            if(dir === 'up') {
                const diff = content.offsetHeight - currentHeight;
                viewport.scrollTop = currentTop + diff;
            }
        }

        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if(e.isIntersecting) {
                    if(e.target.id === 'bottom-sentinel') load('down');
                    if(e.target.id === 'top-sentinel') load('up');
                }
            });
        }, { threshold: 0.1 });

        obs.observe(document.getElementById('top-sentinel'));
        obs.observe(document.getElementById('bottom-sentinel'));

        // Carga Inicial e Centralização
        for(let i=0; i<10; i++) load('down');
        setTimeout(() => {
            const today = document.querySelector('.today');
            if(today) today.scrollIntoView({ block: 'center' });
        }, 50);

        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = t[el.getAttribute('data-i18n')];
        });
    </script>
</body>
</html>
