<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendário Contínuo</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --grid-line: #1a1a1a;
            --text: #e0e0e0;
            --accent: #0366d6;
            --today-bg: rgba(3, 102, 214, 0.3);
            --cell-height: 65px; 
        }

        * { box-sizing: border-box; }
        body { margin: 0; background-color: #000; color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            border-left: 1px solid #222;
            border-right: 1px solid #222;
            position: relative;
        }

        .header-days {
            display: grid;
            grid-template-columns: 60px 50px repeat(7, 1fr);
            background: #151515;
            border-bottom: 2px solid var(--accent);
            text-align: center;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 10px 0;
            z-index: 2000;
        }

        #calendar-viewport {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }

        .year-wrapper {
            position: relative;
            width: 100%;
            display: block;
        }

        /* AJUSTE: O rótulo agora flutua sem ocupar espaço e alinhado ao topo do container */
        .year-sticky-label {
            position: sticky;
            top: 0;
            left: 0;
            width: 60px;
            height: var(--cell-height);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
            border-right: 2px solid var(--grid-line);
            z-index: 100;
            margin-bottom: calc(var(--cell-height) * -1); /* Flutuação sobre a primeira linha */
        }

        .week-row {
            display: grid;
            grid-template-columns: 60px 50px repeat(7, 1fr);
            height: var(--cell-height);
            border-bottom: 1px solid var(--grid-line);
            width: 100%;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--grid-line);
            font-size: 1rem;
        }

        .year-spacer { border-right: 2px solid var(--grid-line); }
        .month-col { color: #888; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .weekend { background: #0d0d0d; }
        .today { background: var(--today-bg); box-shadow: inset 0 0 0 2px var(--accent); }

        .btn-today {
            position: absolute; bottom: 25px; right: 25px;
            background: var(--accent); color: white; border: none;
            padding: 12px 20px; border-radius: 30px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 3000;
            cursor: pointer;
        }

        #top-sentinel, #bottom-sentinel { height: 2px; width: 100%; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-days">
            <div>ANO</div><div>MÊS</div><div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
        </div>

        <div id="calendar-viewport">
            <div id="top-sentinel"></div>
            <div id="calendar-content"></div>
            <div id="bottom-sentinel"></div>
        </div>

        <button class="btn-today" onclick="goToToday()">HOJE</button>
    </div>

    <script>
        const months = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        const content = document.getElementById('calendar-content');
        const viewport = document.getElementById('calendar-viewport');
        
        const now = new Date();
        const pivotDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - now.getDay());
        
        let topOffset = 0;
        let bottomOffset = 0;

function createWeek(offset, mode) {
            const weekDate = new Date(pivotDate);
            weekDate.setDate(pivotDate.getDate() + (offset * 7));
            
            // DESCUBRIR O ANO REAL DESTA SEMANA:
            // Se a semana contém o dia 1º de Janeiro, o rótulo do Ano deve ser o novo ano.
            // Caso contrário, usamos o ano do domingo.
            let yearForThisWeek = weekDate.getFullYear();
            for (let i = 0; i < 7; i++) {
                let d = new Date(weekDate);
                d.setDate(weekDate.getDate() + i);
                if (d.getDate() === 1 && d.getMonth() === 0) {
                    yearForThisWeek = d.getFullYear();
                    break;
                }
            }

            let yearWrap = document.getElementById(`yr-${yearForThisWeek}`);
            if (!yearWrap) {
                yearWrap = document.createElement('div');
                yearWrap.id = `yr-${yearForThisWeek}`;
                yearWrap.className = 'year-wrapper';
                
                const label = document.createElement('div');
                label.className = 'year-sticky-label';
                label.innerText = yearForThisWeek;
                yearWrap.appendChild(label);

                if (mode === 'append') content.appendChild(yearWrap);
                else content.insertBefore(yearWrap, content.firstChild);
            }

            const row = document.createElement('div');
            row.className = 'week-row';
            row.appendChild(document.createElement('div')).className = 'cell year-spacer';

            const monthCell = document.createElement('div');
            monthCell.className = 'cell month-col';
            for(let i=0; i<7; i++) {
                let d = new Date(weekDate);
                d.setDate(weekDate.getDate() + i);
                if (d.getDate() === 1) monthCell.innerText = months[d.getMonth()];
            }
            row.appendChild(monthCell);

            for(let i=0; i<7; i++) {
                const day = new Date(weekDate);
                day.setDate(weekDate.getDate() + i);
                const cell = document.createElement('div');
                cell.className = 'cell' + (i === 0 || i === 6 ? ' weekend' : '');
                if (day.toDateString() === now.toDateString()) cell.classList.add('today');
                cell.innerText = day.getDate();
                row.appendChild(cell);
            }

            if (mode === 'append') {
                yearWrap.appendChild(row);
            } else {
                const label = yearWrap.querySelector('.year-sticky-label');
                yearWrap.insertBefore(row, label.nextSibling);
            }
        }
        
        function load(dir) {
            const hPre = content.offsetHeight;
            const sPre = viewport.scrollTop;
            for(let i=0; i<15; i++) {
                if(dir === 'down') { bottomOffset++; createWeek(bottomOffset, 'append'); }
                else { topOffset--; createWeek(topOffset, 'prepend'); }
            }
            if(dir === 'up') viewport.scrollTop = sPre + (content.offsetHeight - hPre);
        }

        function goToToday() {
            content.innerHTML = "";
            topOffset = 0; bottomOffset = 0;
            createWeek(0, 'append');
            for(let i=0; i<20; i++) load('down');
            const target = document.querySelector('.today');
            if(target) target.scrollIntoView({block:'center', behavior: 'smooth'});
        }

        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if(e.isIntersecting) {
                    if(e.target.id === 'bottom-sentinel') load('down');
                    if(e.target.id === 'top-sentinel') load('up');
                }
            });
        }, { root: viewport, rootMargin: '800px' });

        observer.observe(document.getElementById('top-sentinel'));
        observer.observe(document.getElementById('bottom-sentinel'));

        createWeek(0, 'append');
        for(let i=0; i<25; i++) load('down');
        setTimeout(() => {
            const today = document.querySelector('.today');
            if(today) today.scrollIntoView({block:'center'});
        }, 100);
    </script>
</body>
</html>
