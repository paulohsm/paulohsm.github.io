<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="page-title">Calendário Contínuo / Continuous Calendar</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --grid-line: #1a1a1a;
            --text: #e0e0e0;
            --accent: #0366d6;
            --today-bg: rgba(3, 102, 214, 0.2);
            --today-border: #0366d6;
            --cell-height: 65px; 
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100dvh;
            margin: 0;
            background-color: #000;
            color: var(--text);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100%;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }

        .header-days {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 60px repeat(7, 1fr);
            background: #151515;
            border-bottom: 2px solid var(--accent);
            text-align: center;
            font-size: 0.6rem;
            font-weight: bold;
            padding: 10px 0;
            z-index: 1000;
        }

        #calendar-viewport {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Container do Ano: O segredo do Sticky */
        .year-section {
            position: relative;
        }

        .year-label {
            position: sticky;
            top: 0;
            left: 0;
            width: 60px;
            height: var(--cell-height);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 50;
            float: left; /* Permite que as semanas fiquem ao lado */
        }

        .week-row {
            display: grid;
            grid-template-columns: 60px repeat(7, 1fr);
            border-bottom: 1px solid var(--grid-line);
            height: var(--cell-height);
            width: 100%;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--grid-line);
            font-size: 1rem;
        }

        /* Identificação do Mês na linha do dia 1 */
        .month-tag {
            font-size: 0.65rem;
            color: #888;
            font-weight: bold;
            text-transform: uppercase;
            position: absolute;
            top: 5px;
            left: 5px;
        }

        .cell.day-cell { position: relative; }
        .cell.weekend { background: #0d0d0d; }
        .cell.today { 
            background: var(--today-bg);
            box-shadow: inset 0 0 0 2px var(--today-border);
        }

        #top-sentinel, #bottom-sentinel { height: 1px; clear: both; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-days">
            <div data-i18n="year">ANO</div>
            <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
        </div>

        <div id="calendar-viewport">
            <div id="top-sentinel"></div>
            <div id="calendar-content"></div>
            <div id="bottom-sentinel"></div>
        </div>
    </div>

    <script>
        const i18n = {
            pt: { year: "ANO", months: ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"] },
            en: { year: "YEAR", months: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"] }
        };

        const content = document.getElementById('calendar-content');
        const viewport = document.getElementById('calendar-viewport');
        const lang = navigator.language.startsWith('pt') ? 'pt' : 'en';
        const t = i18n[lang];

        let topDate = new Date();
        topDate.setDate(topDate.getDate() - topDate.getDay());
        let bottomDate = new Date(topDate);

        function createWeek(date, mode) {
            let year = date.getFullYear();
            let yearSection = document.getElementById(`year-${year}`);

            // Se a seção do ano não existe, cria (Lógica para o Sticky)
            if (!yearSection) {
                yearSection = document.createElement('div');
                yearSection.id = `year-${year}`;
                yearSection.className = 'year-section';
                
                const label = document.createElement('div');
                label.className = 'year-label';
                label.innerText = year;
                yearSection.appendChild(label);

                if (mode === 'append') content.appendChild(yearSection);
                else content.insertBefore(yearSection, content.firstChild);
            }

            const row = document.createElement('div');
            row.className = 'week-row';
            
            // Espaçador para a coluna do Ano (que é sticky e flutua à esquerda)
            const spacer = document.createElement('div');
            spacer.className = 'cell';
            spacer.style.borderRight = '1px solid var(--grid-line)';
            row.appendChild(spacer);

            let temp = new Date(date);
            for(let i=0; i<7; i++) {
                const day = document.createElement('div');
                day.className = 'cell day-cell' + (i===0 || i===6 ? ' weekend' : '');
                
                if(temp.toDateString() === new Date().toDateString()) day.classList.add('today');
                
                // Se for dia 1, adiciona o nome do mês
                if (temp.getDate() === 1) {
                    const mTag = document.createElement('span');
                    mTag.className = 'month-tag';
                    mTag.innerText = t.months[temp.getMonth()];
                    day.appendChild(mTag);
                }

                const dNum = document.createElement('span');
                dNum.innerText = temp.getDate();
                day.appendChild(dNum);

                row.appendChild(day);
                temp.setDate(temp.getDate() + 1);
            }

            // Adiciona a linha na seção correta do ano
            if (mode === 'append') yearSection.appendChild(row);
            else {
                // Ao inserir no topo, precisamos colocar após o label
                const firstRow = yearSection.querySelector('.week-row');
                if (firstRow) yearSection.insertBefore(row, firstRow);
                else yearSection.appendChild(row);
            }
        }

        function load(dir) {
            const currentTop = viewport.scrollTop;
            const currentHeight = content.offsetHeight;

            for(let i=0; i<15; i++) {
                if(dir === 'down') {
                    createWeek(new Date(bottomDate), 'append');
                    bottomDate.setDate(bottomDate.getDate() + 7);
                } else {
                    topDate.setDate(topDate.getDate() - 7);
                    createWeek(new Date(topDate), 'prepend');
                }
            }

            if(dir === 'up') {
                const diff = content.offsetHeight - currentHeight;
                viewport.scrollTop = currentTop + diff;
            }
        }

        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if(e.isIntersecting) {
                    if(e.target.id === 'bottom-sentinel') load('down');
                    if(e.target.id === 'top-sentinel') load('up');
                }
            });
        }, { threshold: 0.1 });

        obs.observe(document.getElementById('top-sentinel'));
        obs.observe(document.getElementById('bottom-sentinel'));

        // Carga Inicial
        for(let i=0; i<10; i++) load('down');
        
        setTimeout(() => {
            const today = document.querySelector('.today');
            if(today) today.scrollIntoView({ block: 'center' });
        }, 100);

        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = t[el.getAttribute('data-i18n')];
        });
    </script>
</body>
</html>
