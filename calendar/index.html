<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendário Contínuo | Paulo HSM</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --grid-line: #1a1a1a;
            --text: #e0e0e0;
            --accent: #0366d6;
            --today-bg: rgba(3, 102, 214, 0.3);
            --cell-height: 60px; 
        }

        * { box-sizing: border-box; }
        body { margin: 0; background-color: #000; color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            border-left: 1px solid #222;
            border-right: 1px solid #222;
            position: relative;
        }

        .header-days {
            display: grid;
            grid-template-columns: 60px 50px repeat(7, 1fr);
            background: #151515;
            border-bottom: 2px solid var(--accent);
            text-align: center;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 10px 0;
            z-index: 1000;
        }

        #calendar-viewport {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }

        /* O ANO AGORA É UM ELEMENTO FIXO NO TOPO DA COLUNA */
        .sticky-year {
            position: absolute;
            top: 0;
            left: 0;
            width: 60px;
            height: 100%;
            pointer-events: none; /* Não atrapalha o scroll */
            z-index: 500;
        }

        #current-year-display {
            position: sticky;
            top: 0;
            height: var(--cell-height);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
            border-right: 2px solid var(--grid-line);
        }

        .week-row {
            display: grid;
            grid-template-columns: 60px 50px repeat(7, 1fr);
            height: var(--cell-height);
            border-bottom: 1px solid var(--grid-line);
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--grid-line);
            font-size: 1rem;
        }

        .month-col { color: #888; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .weekend { background: #0d0d0d; }
        .today { background: var(--today-bg); box-shadow: inset 0 0 0 2px var(--accent); }

        .btn-today {
            position: absolute; bottom: 30px; right: 30px;
            background: var(--accent); color: white; border: none;
            padding: 14px 22px; border-radius: 30px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 2000;
            cursor: pointer; font-size: 0.8rem;
        }

        #top-sentinel, #bottom-sentinel { height: 1px; width: 100%; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-days">
            <div>ANO</div><div>MÊS</div><div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
        </div>

        <div id="calendar-viewport">
            <div class="sticky-year">
                <div id="current-year-display">2026</div>
            </div>

            <div id="top-sentinel"></div>
            <div id="calendar-content"></div>
            <div id="bottom-sentinel"></div>
        </div>

        <button class="btn-today" onclick="goToToday()">HOJE</button>
    </div>

    <script>
        const months = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        const content = document.getElementById('calendar-content');
        const viewport = document.getElementById('calendar-viewport');
        const yearDisplay = document.getElementById('current-year-display');
        
        const now = new Date();
        const pivotDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - now.getDay());
        
        let topOffset = 0;
        let bottomOffset = 0;

        function createWeek(offset, mode) {
            const weekDate = new Date(pivotDate);
            weekDate.setDate(pivotDate.getDate() + (offset * 7));
            
            const row = document.createElement('div');
            row.className = 'week-row';
            // Atribuímos o ano como um dado da linha para o observador ler
            row.dataset.year = weekDate.getFullYear();

            // 1. Coluna do Ano (Sempre vazia, o sticky cuidará disso)
            const yearSpacer = document.createElement('div');
            yearSpacer.className = 'cell';
            yearSpacer.style.borderRight = '2px solid var(--grid-line)';
            row.appendChild(yearSpacer);

            // 2. Coluna do Mês
            const monthCell = document.createElement('div');
            monthCell.className = 'cell month-col';
            for(let i=0; i<7; i++) {
                let d = new Date(weekDate);
                d.setDate(weekDate.getDate() + i);
                if (d.getDate() === 1) monthCell.innerText = months[d.getMonth()];
            }
            row.appendChild(monthCell);

            // 3. Dias
            for(let i=0; i<7; i++) {
                const day = new Date(weekDate);
                day.setDate(weekDate.getDate() + i);
                const cell = document.createElement('div');
                cell.className = 'cell' + (i === 0 || i === 6 ? ' weekend' : '');
                if (day.toDateString() === now.toDateString()) cell.classList.add('today');
                cell.innerText = day.getDate();
                row.appendChild(cell);
            }

            if (mode === 'append') content.appendChild(row);
            else content.insertBefore(row, content.firstChild);
        }

        // FUNÇÃO PARA ATUALIZAR O ANO BASEADO NA ROLAGEM
        viewport.addEventListener('scroll', () => {
            const rows = document.querySelectorAll('.week-row');
            // Pegamos a linha que está logo abaixo do header
            for (let row of rows) {
                const rect = row.getBoundingClientRect();
                if (rect.top >= 0 && rect.top < 150) {
                    yearDisplay.innerText = row.dataset.year;
                    break;
                }
            }
        });

        function load(dir) {
            const hPre = content.offsetHeight;
            const sPre = viewport.scrollTop;
            for(let i=0; i<15; i++) {
                if(dir === 'down') { bottomOffset++; createWeek(bottomOffset, 'append'); }
                else { topOffset--; createWeek(topOffset, 'prepend'); }
            }
            if(dir === 'up') viewport.scrollTop = sPre + (content.offsetHeight - hPre);
        }

        function goToToday() {
            content.innerHTML = "";
            topOffset = 0; bottomOffset = 0;
            createWeek(0, 'append');
            for(let i=0; i<15; i++) load('down');
            const target = document.querySelector('.today');
            if(target) target.scrollIntoView({block:'center'});
        }

        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if(e.isIntersecting) {
                    if(e.target.id === 'bottom-sentinel') load('down');
                    if(e.target.id === 'top-sentinel') load('up');
                }
            });
        }, { root: viewport, rootMargin: '600px' });

        obs.observe(document.getElementById('top-sentinel'));
        obs.observe(document.getElementById('bottom-sentinel'));

        createWeek(0, 'append');
        for(let i=0; i<20; i++) load('down');
        setTimeout(() => {
            const todayCell = document.querySelector('.today');
            if(todayCell) todayCell.scrollIntoView({block:'center'});
        }, 100);
    </script>
</body>
</html>
