<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="page-title">Calendário Contínuo / Continuous Calendar</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --grid-line: #222;
            --text: #e0e0e0;
            --accent: #0366d6;
            --today-bg: rgba(3, 102, 214, 0.2);
            --today-border: #0366d6;
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100dvh;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        body { display: flex; flex-direction: column; }

        /* Cabeçalho Fixo */
        .header-grid {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 55px 55px repeat(7, 1fr);
            background: #151515;
            border-bottom: 2px solid var(--accent);
            text-align: center;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 12px 0;
            z-index: 10;
        }

        /* Container de Rolagem */
        #calendar-viewport {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .week-row {
            display: grid;
            grid-template-columns: 55px 55px repeat(7, 1fr);
            border-bottom: 1px solid var(--grid-line);
            min-height: 50px;
        }

        .cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--grid-line);
            font-size: 0.95rem;
            position: relative;
        }

        .cell.year { font-weight: bold; color: var(--accent); font-size: 0.75rem; background: #0d0d0d; }
        .cell.month { font-weight: bold; color: #888; font-size: 0.75rem; text-transform: uppercase; background: #0d0d0d; }
        
        .cell.weekend { background: #111; }
        
        .cell.today { 
            background: var(--today-bg);
            color: #fff;
            font-weight: bold;
            outline: 2px solid var(--today-border);
            outline-offset: -2px;
        }

        /* Marcadores de Sentinela para Carregamento Infinito */
        #top-sentinel, #bottom-sentinel { height: 1px; width: 100%; }
    </style>
</head>
<body>

    <div class="header-grid" id="header-labels">
        <div data-i18n="year">ANO</div>
        <div data-i18n="month">MÊS</div>
        <div data-i18n="d0">DOM</div><div data-i18n="d1">SEG</div><div data-i18n="d2">TER</div><div data-i18n="d3">QUA</div><div data-i18n="d4">QUI</div><div data-i18n="d5">SEX</div><div data-i18n="d6">SÁB</div>
    </div>

    <div id="calendar-viewport">
        <div id="top-sentinel"></div>
        <div id="calendar-content"></div>
        <div id="bottom-sentinel"></div>
    </div>

    <script>
        const i18n = {
            pt: { year: "ANO", month: "MÊS", d0:"DOM", d1:"SEG", d2:"TER", d3:"QUA", d4:"QUI", d5:"SEX", d6:"SÁB", months: ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"] },
            en: { year: "YEAR", month: "MONTH", d0:"SUN", d1:"MON", d2:"TUE", d3:"WED", d4:"THU", d5:"FRI", d6:"SAT", months: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"] }
        };

        const viewport = document.getElementById('calendar-viewport');
        const content = document.getElementById('calendar-content');
        const lang = navigator.language.startsWith('pt') ? 'pt' : 'en';
        const t = i18n[lang];

        let topDate = new Date(); // Data da primeira linha visível
        let bottomDate = new Date(); // Data da última linha visível
        
        // Ajusta ambas para o início da semana atual
        topDate.setDate(topDate.getDate() - topDate.getDay());
        bottomDate = new Date(topDate);

        function createRow(date, isAppend) {
            const row = document.createElement('div');
            row.className = 'week-row';

            // Célula Ano
            const yearCell = document.createElement('div');
            yearCell.className = 'cell year';
            if (date.getMonth() === 0 && date.getDate() <= 7) yearCell.innerText = date.getFullYear();
            row.appendChild(yearCell);

            // Célula Mês
            const monthCell = document.createElement('div');
            monthCell.className = 'cell month';
            if (date.getDate() <= 7) monthCell.innerText = t.months[date.getMonth()];
            row.appendChild(monthCell);

            // Células Dias
            let tempDate = new Date(date);
            for (let i = 0; i < 7; i++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'cell';
                if (i === 0 || i === 6) dayCell.classList.add('weekend');
                
                if (tempDate.toDateString() === new Date().toDateString()) dayCell.classList.add('today');

                dayCell.innerText = tempDate.getDate();
                row.appendChild(dayCell);
                tempDate.setDate(tempDate.getDate() + 1);
            }

            if (isAppend) content.appendChild(row);
            else content.insertBefore(row, content.firstChild);
        }

        function loadMore(direction) {
            for (let i = 0; i < 20; i++) { // Carrega 20 semanas por vez
                if (direction === 'down') {
                    bottomDate.setDate(bottomDate.getDate() + 7);
                    createRow(bottomDate, true);
                } else {
                    topDate.setDate(topDate.getDate() - 7);
                    createRow(topDate, false);
                    // Ajuste de scroll para não "pular" ao carregar para cima
                    viewport.scrollTop += 51; 
                }
            }
        }

        // Observer para detectar o fim da rolagem
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    if (entry.target.id === 'bottom-sentinel') loadMore('down');
                    if (entry.target.id === 'top-sentinel') loadMore('up');
                }
            });
        }, { threshold: 0.1 });

        observer.observe(document.getElementById('top-sentinel'));
        observer.observe(document.getElementById('bottom-sentinel'));

        // Internacionalização básica das labels
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = t[el.getAttribute('data-i18n')];
        });

        // Carga inicial
        createRow(topDate, true);
        loadMore('down');
        
        // Centraliza no "hoje" inicialmente
        setTimeout(() => {
            const today = document.querySelector('.today');
            if(today) today.scrollIntoView({ block: 'center' });
        }, 100);

    </script>
</body>
</html>
