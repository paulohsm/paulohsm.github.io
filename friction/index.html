<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Atrito Pro | Paulo HSM</title>
    <style>
        :root { --bg: #0a0a0a; --panel: #161616; --accent: #2196f3; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        .toolbar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 15px; background: var(--panel); border-bottom: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input { background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 5px; cursor: pointer; }
        
        .main-layout { flex: 1; display: grid; grid-template-columns: 1fr 280px; overflow: hidden; }
        #canvas-container { position: relative; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }

        .side-bar { background: var(--panel); border-left: 1px solid #333; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .data-card { background: #222; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .data-line { font-family: 'Consolas', monospace; font-size: 0.9rem; margin: 5px 0; display: flex; justify-content: space-between; }
        
        .vector-legend { font-size: 0.8rem; display: flex; flex-direction: column; gap: 8px; }
        .vector-item { display: flex; align-items: center; gap: 10px; }
        .color-box { width: 12px; height: 12px; border-radius: 2px; }

        .btn-group { display: flex; gap: 10px; margin-top: auto; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-move { background: var(--accent); color: white; }
        .btn-params { background: #444; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="control-group">
        <label>Material do Bloco</label>
        <select id="bloco" onchange="updateMaterials()"></select>
    </div>
    <div class="control-group">
        <label>Material do Plano</label>
        <select id="plano" onchange="updateMaterials()"></select>
    </div>
    <div class="control-group">
        <label>Massa: <span id="m-val">10</span> kg</label>
        <input type="range" id="mass" min="1" max="50" value="10" oninput="updateValues()">
    </div>
    <div class="control-group">
        <label>Ângulo: <span id="a-val">30</span>°</label>
        <input type="range" id="angle" min="0" max="80" value="30" oninput="updateValues()">
    </div>
</div>

<div class="main-layout">
    <div id="canvas-container">
        <canvas id="simCanvas"></canvas>
    </div>

    <div class="side-bar">
        <div class="data-card">
            <div class="data-line"><span>μₑ (estático):</span> <span id="ue-val">0.50</span></div>
            <div class="data-line"><span>μₖ (cinético):</span> <span id="uk-val">0.30</span></div>
            <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
            <div class="data-line"><span>Aceleração:</span> <span id="acc-val">0.00</span> m/s²</div>
            <div class="data-line"><span>Velocidade:</span> <span id="vel-val">0.00</span> m/s</div>
        </div>

        <div class="vector-legend">
            <div class="vector-item"><div class="color-box" style="background:#2196f3"></div> Peso (P)</div>
            <div class="vector-item"><div class="color-box" style="background:#f44336"></div> Normal (N)</div>
            <div class="vector-item"><div class="color-box" style="background:#4caf50"></div> Atrito (fₐₜ)</div>
            <div class="vector-item"><div class="color-box" style="background:#ffffff"></div> Resultante (Fᵣ)</div>
        </div>

        <div class="btn-group">
            <button class="btn-move" onclick="resetMotion()">Reposicionar</button>
            <button class="btn-params" onclick="resetAll()">Reset Total</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');

const mats = {
    madeira: { n: "Madeira", ue: 0.5, uk: 0.3, color: "#8B4513", pattern: "wood" },
    aco: { n: "Aço Polido", ue: 0.74, uk: 0.57, color: "#71797E", pattern: "metal" },
    borracha: { n: "Borracha", ue: 0.9, uk: 0.8, color: "#333", pattern: "rubber" },
    gelo: { n: "Gelo", ue: 0.1, uk: 0.03, color: "#e3f2fd", pattern: "ice" },
    aluminio: { n: "Alumínio", ue: 1.05, uk: 0.8, color: "#b0bec5", pattern: "metal" }
};

let sim = { x: -300, v: 0, a: 0 };
const G = 9.8;

function populate() {
    const b = document.getElementById('bloco'), p = document.getElementById('plano');
    Object.keys(mats).forEach(m => {
        b.add(new Option(mats[m].n, m));
        p.add(new Option(mats[m].n, m));
    });
    b.value = "madeira"; p.value = "aco";
    updateMaterials();
}

function updateMaterials() {
    const bKey = document.getElementById('bloco').value;
    const pKey = document.getElementById('plano').value;
    const b = mats[bKey];
    const p = mats[pKey];
    
    // Coeficientes combinados
    document.getElementById('ue-val').innerText = ((b.ue + p.ue)/2).toFixed(2);
    document.getElementById('uk-val').innerText = ((b.uk + p.uk)/2).toFixed(2);
    resetMotion();
}

function updateValues() {
    document.getElementById('m-val').innerText = document.getElementById('mass').value;
    document.getElementById('a-val').innerText = document.getElementById('angle').value;
    resetMotion();
}

function resetMotion() { 
    sim.x = -300; 
    sim.v = 0; 
    sim.a = 0;
}

function resetAll() {
    document.getElementById('bloco').value = "madeira";
    document.getElementById('plano').value = "aco";
    document.getElementById('mass').value = 10;
    document.getElementById('angle').value = 30;
    updateValues();
    updateMaterials();
}

function drawPattern(type, color) {
    ctx.fillStyle = color;
    ctx.fillRect(-25, -25, 50, 50);
    
    if (type === "wood") {
        ctx.strokeStyle = "rgba(0,0,0,0.2)";
        ctx.lineWidth = 1;
        for(let i=-20; i<=20; i+=8) {
            ctx.beginPath(); ctx.moveTo(i, -25); ctx.lineTo(i, 25); ctx.stroke();
        }
    } else if (type === "metal") {
        let grad = ctx.createLinearGradient(-25, -25, 25, 25);
        grad.addColorStop(0, 'rgba(255,255,255,0.3)');
        grad.addColorStop(0.5, 'rgba(255,255,255,0)');
        grad.addColorStop(1, 'rgba(0,0,0,0.3)');
        ctx.fillStyle = grad;
        ctx.fillRect(-25, -25, 50, 50);
    }
}

function loop() {
    // Redimensionamento sem rastro
    if (canvas.width !== canvas.offsetWidth || canvas.height !== canvas.offsetHeight) {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }

    // Limpeza TOTAL do quadro
    ctx.setTransform(1, 0, 0, 1, 0, 0); 
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const theta = document.getElementById('angle').value * Math.PI / 180;
    const m = parseFloat(document.getElementById('mass').value);
    const ue = parseFloat(document.getElementById('ue-val').innerText);
    const uk = parseFloat(document.getElementById('uk-val').innerText);

    // Física
    const P = m * G;
    const Px = P * Math.sin(theta);
    const Py = P * Math.cos(theta);
    const N = Py;
    const fat_est_max = ue * N;
    
    let fat = 0;
    if (sim.v === 0) {
        if (Px > fat_est_max) {
            fat = uk * N;
            sim.a = (Px - fat) / m;
        } else {
            fat = Px;
            sim.a = 0;
        }
    } else {
        fat = uk * N;
        sim.a = (Px - fat) / m;
        // Impedir que o atrito inverta o movimento (física de parada)
        if (sim.a < 0 && Math.abs(sim.v) < 0.1) { sim.v = 0; sim.a = 0; }
    }

    // Atualiza posição se estiver no plano
    if (sim.x < canvas.width/2) {
        sim.v += sim.a * 0.016;
        sim.x += sim.v * 2; 
    }

    // Centro do Canvas
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    
    ctx.translate(cx, cy);

    // 1. Desenho do Plano (Texturizado)
    ctx.save();
    ctx.rotate(theta);
    const pMat = mats[document.getElementById('plano').value];
    ctx.fillStyle = pMat.color;
    ctx.fillRect(-canvas.width, 25, canvas.width*2, 40); 
    // Detalhe de textura do plano
    if(pMat.pattern === "wood") {
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        for(let j=-canvas.width; j<canvas.width; j+=40) ctx.fillRect(j, 25, 2, 40);
    }
    ctx.restore();

    // 2. Desenho do Bloco e Vetores
    ctx.save();
    // Translação do bloco ao longo da inclinação
    ctx.translate(sim.x * Math.cos(theta), sim.x * Math.sin(theta));
    
    // Rotação do conjunto bloco+vetores para alinhar com o plano
    ctx.rotate(theta);
    
    const bMat = mats[document.getElementById('bloco').value];
    drawPattern(bMat.pattern, bMat.color);
    
    // Funções de Vetores (Escalados)
    const vScale = 1.2;
    const drawVec = (angle, mag, col, isResultant = false) => {
        if (mag < 0.5) return;
        const len = mag * vScale;
        ctx.strokeStyle = col; 
        ctx.lineWidth = isResultant ? 4 : 2;
        ctx.beginPath(); 
        ctx.moveTo(0,0);
        ctx.lineTo(len * Math.cos(angle), len * Math.sin(angle));
        ctx.stroke();
        // Seta
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.arc(len * Math.cos(angle), len * Math.sin(angle), 3, 0, 7);
        ctx.fill();
    };

    // PESO: Precisa ser sempre vertical "para baixo" no mundo real.
    // Como o contexto está rotacionado por theta, compensamos:
    drawVec(Math.PI/2 - theta, P, "#2196f3"); 

    // NORMAL: Perpendicular ao plano (para cima no contexto rotacionado)
    drawVec(-Math.PI/2, N, "#f44336");       

    // ATRITO: Paralelo ao plano, oposto ao movimento (para a esquerda no contexto rotacionado)
    drawVec(Math.PI, fat, "#4caf50");        

    // RESULTANTE: Paralela ao plano, na direção da aceleração
    if (sim.a > 0.01) drawVec(0, m * sim.a, "#ffffff", true);

    ctx.restore();

    document.getElementById('acc-val').innerText = sim.a.toFixed(2);
    document.getElementById('vel-val').innerText = sim.v.toFixed(2);

    requestAnimationFrame(loop);
}

populate();
loop();
</script>
</body>
</html>
