<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atrito Estático e Dinâmico</title>
    <style>
        :root { --bg: #0a0a0a; --panel: #161616; --accent: #2196f3; --text: #e0e0e0; }
        * { box-sizing: border-box; }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        .toolbar { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); 
            gap: 12px; padding: 15px; 
            background: var(--panel); 
            border-bottom: 1px solid #333; 
            z-index: 10; 
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        select, input { background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; }
        
        .main-layout { flex: 1; display: flex; flex-direction: row; overflow: hidden; }
        #canvas-container { flex: 1; position: relative; background: #111; min-height: 180px; }
        canvas { width: 100%; height: 100%; display: block; }

        .side-bar { 
            width: 340px; 
            background: var(--panel); 
            border-left: 1px solid #333; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
        }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .side-bar { 
                width: 100%; 
                border-left: none; 
                border-top: 1px solid #333; 
                padding: 10px;
                display: grid;
                grid-template-columns: 1fr 1fr; 
                gap: 8px;
            }
            .btn-group { grid-column: span 2; margin-top: 5px; }
        }

        .data-card, .vector-legend { 
            background: #222; 
            padding: 10px; 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            border-left: 3px solid var(--accent);
            border-right: 3px solid var(--accent);
        }
        
        .data-line, .vector-item { font-family: 'Consolas', monospace; font-size: 0.8rem; margin: 3px 0; display: flex; align-items: center; white-space: nowrap; }
        .label-text { margin-right: 5px; color: #aaa; }
        .value-text { font-weight: bold; color: #fff; }
        .color-box { width: 10px; height: 10px; border-radius: 2px; margin-right: 8px; flex-shrink: 0; }

        .btn-group { display: flex; gap: 8px; width: 100%; }
        button { flex: 1; padding: 12px 5px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.75rem; transition: 0.2s; white-space: nowrap; }
        
        .btn-active { background: var(--accent); color: white; }
        button:disabled { background: #333 !important; color: #666 !important; opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="control-group">
        <label>Bloco</label>
        <select id="bloco" onchange="updateMaterials()"></select>
    </div>
    <div class="control-group">
        <label>Plano</label>
        <select id="plano" onchange="updateMaterials()"></select>
    </div>
    <div class="control-group">
        <label>Massa: <span id="m-val">10.0</span> kg</label>
        <input type="range" id="mass" min="1" max="20" value="10" step="0.1" oninput="updateValues()">
    </div>
    <div class="control-group">
        <label>Ângulo: <span id="a-val">30.0</span>°</label>
        <input type="range" id="angle" min="0" max="80" value="30" step="0.1" oninput="updateValues()">
    </div>
</div>

<div class="main-layout">
    <div id="canvas-container">
        <canvas id="simCanvas"></canvas>
    </div>

    <div class="side-bar">
        <div class="data-card" id="card-coefs"></div>

        <div class="vector-legend">
            <div class="vector-item"><span class="color-box" style="background:#2196f3"></span> <span class="label-text">P:</span> <span class="value-text"><span id="mod-p">0.0</span> N</span></div>
            <div class="vector-item"><span class="color-box" style="background:#f44336"></span> <span class="label-text">N:</span> <span class="value-text"><span id="mod-n">0.0</span> N</span></div>
            <div class="vector-item"><span class="color-box" style="background:#4caf50"></span> <span class="label-text">Fat:</span> <span class="value-text"><span id="mod-fat">0.0</span> N</span></div>
            <div class="vector-item"><span class="color-box" style="background:#ffffff"></span> <span class="label-text">Fr:</span> <span class="value-text"><span id="mod-fr">0.0</span> N</span></div>
        </div>

        <div class="btn-group">
            <button id="btnStart" class="btn-active" onclick="handleStart()">INICIAR</button>
            <button id="btnPause" class="btn-active" onclick="handlePause()" disabled>PAUSAR</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');

const mats = {
    madeira: { n: "Madeira", ue: 0.5, uk: 0.3, color: "#8B4513" },
    aco: { n: "Aço Polido", ue: 0.74, uk: 0.57, color: "#71797E" },
    borracha: { n: "Borracha", ue: 0.9, uk: 0.8, color: "#333" },
    gelo: { n: "Gelo", ue: 0.1, uk: 0.03, color: "#e3f2fd" },
    aluminio: { n: "Alumínio", ue: 1.05, uk: 0.8, color: "#b0bec5" },
    concreto: { n: "Concreto", ue: 1.0, uk: 0.8, color: "#555" }
};

let sim = { x: -280, v: 0, a: 0, active: false, paused: false, startedOnce: false };
const G = 9.8;

function populate() {
    const b = document.getElementById('bloco'), p = document.getElementById('plano');
    Object.keys(mats).forEach(m => {
        b.add(new Option(mats[m].n, m));
        p.add(new Option(mats[m].n, m));
    });
    b.value = "madeira"; p.value = "aco";
    updateMaterials();
}

function triggerParamChange() {
    sim.startedOnce = false;
    sim.active = false;
    document.getElementById('btnStart').innerText = "INICIAR";
    document.getElementById('btnPause').disabled = true;
    document.getElementById('btnPause').innerText = "PAUSAR";
}

function updateMaterials() {
    const b = mats[document.getElementById('bloco').value];
    const p = mats[document.getElementById('plano').value];
    const ue = ((b.ue + p.ue)/2).toFixed(2);
    const uk = ((b.uk + p.uk)/2).toFixed(2);
    
    document.getElementById('card-coefs').innerHTML = `
        <div class="data-line"><span class="label-text">μ<sub>e</sub>:</span> <span class="value-text">${ue}</span></div>
        <div class="data-line"><span class="label-text">μ<sub>d</sub>:</span> <span class="value-text">${uk}</span></div>
        <div class="data-line"><span class="label-text">a:</span> <span class="value-text" id="acc-val">0.00</span> m/s²</div>
        <div class="data-line"><span class="label-text">v:</span> <span class="value-text" id="vel-val">0.00</span> m/s</div>
    `;
    triggerParamChange();
    resetMotion();
}

function updateValues() {
    document.getElementById('m-val').innerText = parseFloat(document.getElementById('mass').value).toFixed(1);
    document.getElementById('a-val').innerText = parseFloat(document.getElementById('angle').value).toFixed(1);
    triggerParamChange();
    resetMotion();
}

function handleStart() {
    if (!sim.active && !sim.startedOnce) {
        sim.active = true;
        sim.startedOnce = true;
        document.getElementById('btnStart').innerText = "REINICIAR";
        document.getElementById('btnPause').disabled = false;
    } else {
        resetMotion();
        sim.active = true;
        sim.paused = false;
        document.getElementById('btnPause').innerText = "PAUSAR";
    }
}

function handlePause() {
    sim.paused = !sim.paused;
    document.getElementById('btnPause').innerText = sim.paused ? "CONTINUAR" : "PAUSAR";
}

function resetMotion() { 
    // Coordenadas iniciais otimizadas para borda esquerda
    sim.x = window.innerWidth < 768 ? -160 : -380; 
    sim.v = 0; 
    sim.a = 0;
    if (sim.startedOnce) {
        sim.paused = false;
        document.getElementById('btnPause').innerText = "PAUSAR";
    }
}

function drawArrowhead(endX, endY, angle, color) {
    const headLen = 8;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(endX, endY);
    ctx.lineTo(endX - headLen * Math.cos(angle - Math.PI / 7), endY - headLen * Math.sin(angle - Math.PI / 7));
    ctx.lineTo(endX - headLen * Math.cos(angle + Math.PI / 7), endY - headLen * Math.sin(angle + Math.PI / 7));
    ctx.closePath();
    ctx.fill();
}

function loop() {
    if (canvas.width !== canvas.offsetWidth || canvas.height !== canvas.offsetHeight) {
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    }
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    const isMobile = window.innerWidth < 768;
    const theta = document.getElementById('angle').value * Math.PI / 180;
    const m = parseFloat(document.getElementById('mass').value);
    
    const ue = parseFloat(document.querySelector('#card-coefs .value-text').innerText);
    const uk = parseFloat(document.querySelectorAll('#card-coefs .value-text')[1].innerText);

    const P = m * G;
    const Px = P * Math.sin(theta);
    const Py = P * Math.cos(theta);
    const N = Py;
    const fat_est_max = ue * N;
    
    let fat = 0;
    if (sim.v === 0) {
        if (Px > fat_est_max) { fat = uk * N; sim.a = (Px - fat) / m; }
        else { fat = Px; sim.a = 0; }
    } else {
        fat = uk * N;
        sim.a = (Px - fat) / m;
        if (sim.a < 0 && Math.abs(sim.v) < 0.1) { sim.v = 0; sim.a = 0; }
    }

    if (sim.active && !sim.paused) {
        const limit = (canvas.width / (2 * Math.cos(theta))) - 30;
        if (sim.x < limit) {
            sim.v += sim.a * 0.016;
            sim.x += sim.v * 2; 
        } else {
            sim.v = 0; sim.a = 0;
        }
    }

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    ctx.translate(cx, cy);

    // Arco de Ângulo
    const arcSize = isMobile ? 40 : 60;
    ctx.beginPath(); ctx.strokeStyle = "#444";
    ctx.arc(0, 0, arcSize, 0, theta); ctx.stroke();
    ctx.fillStyle = "#888"; ctx.font = isMobile ? "10px Arial" : "12px Arial";
    ctx.fillText(document.getElementById('angle').value + "°", arcSize+5, 12);

    // Plano
    ctx.save();
    ctx.rotate(theta);
    ctx.fillStyle = mats[document.getElementById('plano').value].color;
    ctx.fillRect(-canvas.width, 20, canvas.width*2, isMobile ? 20 : 30); 
    ctx.restore();

    // Bloco
    ctx.save();
    ctx.translate(sim.x * Math.cos(theta), sim.x * Math.sin(theta));
    ctx.rotate(theta);
    ctx.fillStyle = mats[document.getElementById('bloco').value].color;
    const bSize = isMobile ? 18 : 25;
    ctx.fillRect(-bSize, -bSize, bSize*2, bSize*2);
    
    const vScale = isMobile ? 0.6 : 0.9;
    const drawVec = (angle, mag, col, label, isFr = false) => {
        if (mag < 0.5) return;
        const len = mag * vScale;
        const endX = len * Math.cos(angle);
        const endY = len * Math.sin(angle);
        
        ctx.strokeStyle = col; ctx.lineWidth = isFr ? 3 : 1.5;
        ctx.beginPath(); ctx.moveTo(0,0);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        
        drawArrowhead(endX, endY, angle, col);

        ctx.fillStyle = col; ctx.font = `bold ${isMobile?10:12}px Arial`;
        ctx.fillText(label, (len+(isMobile?15:18)) * Math.cos(angle), (len+(isMobile?15:18)) * Math.sin(angle));
    };

    drawVec(Math.PI/2 - theta, P, "#2196f3", "P"); 
    drawVec(-Math.PI/2, N, "#f44336", "N");       
    drawVec(Math.PI, fat, "#4caf50", "Fat");        
    if (sim.a > 0.01) drawVec(0, m * sim.a, "#ffffff", "Fr", true);

    ctx.restore();

    document.getElementById('mod-p').innerText = P.toFixed(1);
    document.getElementById('mod-n').innerText = N.toFixed(1);
    document.getElementById('mod-fat').innerText = fat.toFixed(1);
    document.getElementById('mod-fr').innerText = (m * sim.a).toFixed(1);
    document.getElementById('acc-val').innerText = sim.a.toFixed(2);
    document.getElementById('vel-val').innerText = sim.v.toFixed(2);

    requestAnimationFrame(loop);
}
populate();
loop();
</script>
</body>
</html>
