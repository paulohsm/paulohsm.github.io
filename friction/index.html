<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Atrito Pro | Paulo HSM</title>
    <style>
        :root { --bg: #0a0a0a; --panel: #161616; --accent: #2196f3; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        /* Toolbar Superior - Restaurada para organização original */
        .toolbar { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 12px; padding: 15px; 
            background: var(--panel); 
            border-bottom: 1px solid #333; 
            z-index: 10; 
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input { background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 5px; cursor: pointer; }
        
        .main-layout { flex: 1; display: flex; flex-direction: row; overflow: hidden; }
        #canvas-container { flex: 1; position: relative; background: #111; min-height: 200px; }
        canvas { width: 100%; height: 100%; display: block; }

        /* Painel Lateral / Inferior */
        .side-bar { 
            width: 320px; 
            background: var(--panel); 
            border-left: 1px solid #333; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
        }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .side-bar { 
                width: 100%; 
                border-left: none; 
                border-top: 1px solid #333; 
                padding: 10px;
                display: grid;
                /* Colunas ajustadas para fechar o espaço vazio na direita */
                grid-template-columns: 1fr auto; 
                gap: 10px;
            }
            .btn-group { grid-column: span 2; }
        }

        .data-card, .vector-legend { 
            background: #222; 
            padding: 12px; 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column;
            justify-content: center;
        }
        
        .data-card { border-left: 3px solid var(--accent); }

        /* Espaçamento vertical padronizado */
        .data-line, .vector-item { 
            font-family: 'Consolas', monospace; 
            font-size: 0.85rem; 
            margin: 3px 0; 
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .label-text { margin-right: 6px; color: #aaa; }
        .value-text { font-weight: bold; color: #fff; }

        .color-box { width: 10px; height: 10px; border-radius: 2px; margin-right: 8px; flex-shrink: 0; }

        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .btn-move { background: var(--accent); color: white; }
        .btn-params { background: #333; color: white; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="control-group">
        <label>Material do Bloco</label>
        <select id="bloco" onchange="updateMaterials()"></select>
    </div>
    <div class="control-group">
        <label>Material do Plano</label>
        <select id="plano" onchange="updateMaterials()"></select>
    </div>
    <div class="control-group">
        <label>Massa: <span id="m-val">10</span> kg</label>
        <input type="range" id="mass" min="1" max="20" value="10" oninput="updateValues()">
    </div>
    <div class="control-group">
        <label>Ângulo: <span id="a-val">30</span>°</label>
        <input type="range" id="angle" min="0" max="80" value="30" oninput="updateValues()">
    </div>
</div>

<div class="main-layout">
    <div id="canvas-container">
        <canvas id="simCanvas"></canvas>
    </div>

    <div class="side-bar">
        <div class="data-card">
            <div class="data-line"><span class="label-text">&mu;e:</span> <span class="value-text" id="ue-val">0.50</span></div>
            <div class="data-line"><span class="label-text">&mu;d:</span> <span class="value-text" id="uk-val">0.30</span></div>
            <div class="data-line"><span class="label-text">a:</span> <span class="value-text" id="acc-val">0.00</span> m/s&sup2;</div>
            <div class="data-line"><span class="label-text">v:</span> <span class="value-text" id="vel-val">0.00</span> m/s</div>
        </div>

        <div class="vector-legend">
            <div class="vector-item"><span class="color-box" style="background:#2196f3"></span> <span class="label-text">P:</span> <span class="value-text"><span id="mod-p">0</span> N</span></div>
            <div class="vector-item"><span class="color-box" style="background:#f44336"></span> <span class="label-text">N:</span> <span class="value-text"><span id="mod-n">0</span> N</span></div>
            <div class="vector-item"><span class="color-box" style="background:#4caf50"></span> <span class="label-text">Fat:</span> <span class="value-text"><span id="mod-fat">0</span> N</span></div>
            <div class="vector-item"><span class="color-box" style="background:#ffffff"></span> <span class="label-text">Fr:</span> <span class="value-text"><span id="mod-fr">0</span> N</span></div>
        </div>

        <div class="btn-group">
            <button class="btn-move" onclick="resetMotion()">REPOSICIONAR</button>
            <button class="btn-params" onclick="resetAll()">RESET TOTAL</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');

const mats = {
    madeira: { n: "Madeira", ue: 0.5, uk: 0.3, color: "#8B4513" },
    aco: { n: "Aço Polido", ue: 0.74, uk: 0.57, color: "#71797E" },
    borracha: { n: "Borracha", ue: 0.9, uk: 0.8, color: "#333" },
    gelo: { n: "Gelo", ue: 0.1, uk: 0.03, color: "#e3f2fd" },
    aluminio: { n: "Alumínio", ue: 1.05, uk: 0.8, color: "#b0bec5" },
    concreto: { n: "Concreto", ue: 1.0, uk: 0.8, color: "#555" }
};

let sim = { x: -200, v: 0, a: 0 };
const G = 9.8;

function populate() {
    const b = document.getElementById('bloco'), p = document.getElementById('plano');
    Object.keys(mats).forEach(m => {
        b.add(new Option(mats[m].n, m));
        p.add(new Option(mats[m].n, m));
    });
    b.value = "madeira"; p.value = "aco";
    updateMaterials();
}

function updateMaterials() {
    const b = mats[document.getElementById('bloco').value];
    const p = mats[document.getElementById('plano').value];
    document.getElementById('ue-val').innerText = ((b.ue + p.ue)/2).toFixed(2);
    document.getElementById('uk-val').innerText = ((b.uk + p.uk)/2).toFixed(2);
    resetMotion();
}

function updateValues() {
    document.getElementById('m-val').innerText = document.getElementById('mass').value;
    document.getElementById('a-val').innerText = document.getElementById('angle').value;
    resetMotion();
}

function resetMotion() { sim.x = -200; sim.v = 0; sim.a = 0; }
function resetAll() {
    document.getElementById('bloco').value = "madeira";
    document.getElementById('plano').value = "aco";
    document.getElementById('mass').value = 10;
    document.getElementById('angle').value = 30;
    updateValues(); updateMaterials();
}

function loop() {
    if (canvas.width !== canvas.offsetWidth || canvas.height !== canvas.offsetHeight) {
        canvas.width = canvas.offsetWidth; 
        canvas.height = canvas.offsetHeight;
    }
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    const theta = document.getElementById('angle').value * Math.PI / 180;
    const m = parseFloat(document.getElementById('mass').value);
    const ue = parseFloat(document.getElementById('ue-val').innerText);
    const uk = parseFloat(document.getElementById('uk-val').innerText);

    const P = m * G;
    const Px = P * Math.sin(theta);
    const Py = P * Math.cos(theta);
    const N = Py;
    const fat_est_max = ue * N;
    
    let fat = 0;
    if (sim.v === 0) {
        if (Px > fat_est_max) { fat = uk * N; sim.a = (Px - fat) / m; }
        else { fat = Px; sim.a = 0; }
    } else {
        fat = uk * N;
        sim.a = (Px - fat) / m;
        if (sim.a < 0 && Math.abs(sim.v) < 0.1) { sim.v = 0; sim.a = 0; }
    }

    if (sim.x < canvas.width/3) {
        sim.v += sim.a * 0.016;
        sim.x += sim.v * 2; 
    }

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    ctx.translate(cx, cy);

    // Arco de Ângulo
    ctx.beginPath();
    ctx.strokeStyle = "#444";
    ctx.arc(0, 0, 45, 0, theta);
    ctx.stroke();
    ctx.fillStyle = "#888";
    ctx.font = "11px Arial";
    ctx.fillText(document.getElementById('angle').value + "°", 48, 12);

    // Plano
    ctx.save();
    ctx.rotate(theta);
    ctx.fillStyle = mats[document.getElementById('plano').value].color;
    ctx.fillRect(-canvas.width, 20, canvas.width*2, 30); 
    ctx.restore();

    // Bloco
    ctx.save();
    ctx.translate(sim.x * Math.cos(theta), sim.x * Math.sin(theta));
    ctx.rotate(theta);
    ctx.fillStyle = mats[document.getElementById('bloco').value].color;
    ctx.fillRect(-22, -22, 44, 44);
    
    const vScale = 0.85; 
    const drawVec = (angle, mag, col, label, isResultant = false) => {
        if (mag < 0.5) return;
        const len = mag * vScale;
        ctx.strokeStyle = col; ctx.lineWidth = isResultant ? 3 : 1.5;
        ctx.beginPath(); ctx.moveTo(0,0);
        ctx.lineTo(len * Math.cos(angle), len * Math.sin(angle));
        ctx.stroke();
        ctx.fillStyle = col;
        ctx.font = "bold 12px Arial";
        ctx.fillText(label, (len+10) * Math.cos(angle), (len+10) * Math.sin(angle));
    };

    drawVec(Math.PI/2 - theta, P, "#2196f3", "P"); 
    drawVec(-Math.PI/2, N, "#f44336", "N");       
    drawVec(Math.PI, fat, "#4caf50", "Fat");        
    if (sim.a > 0.01) drawVec(0, m * sim.a, "#ffffff", "Fr", true);

    ctx.restore();

    document.getElementById('mod-p').innerText = P.toFixed(0);
    document.getElementById('mod-n').innerText = N.toFixed(0);
    document.getElementById('mod-fat').innerText = fat.toFixed(0);
    document.getElementById('mod-fr').innerText = (m * sim.a).toFixed(0);
    document.getElementById('acc-val').innerText = sim.a.toFixed(2);
    document.getElementById('vel-val').innerText = sim.v.toFixed(2);

    requestAnimationFrame(loop);
}
populate();
loop();
</script>
</body>
</html>
