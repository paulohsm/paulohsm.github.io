<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resistor Calc | Paulo HSM</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --accent: #0366d6;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. Representação do Resistor */
        .resistor-display {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .resistor-body {
            width: 200px;
            height: 40px;
            background: #d1b48c;
            border-radius: 10px;
            position: relative;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 2px solid #a88d66;
        }

        .band {
            width: 12px;
            height: 100%;
            transition: background 0.3s;
        }

        /* 2. Valores de Resistência */
        .results {
            text-align: center;
            padding: 10px;
            background: var(--card);
            border-top: 1px solid #333;
        }

        .main-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }

        .tolerance-values {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 5px;
        }

        /* 3. Tabela de Cores (Seletor) */
        .color-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            padding: 10px;
            background: var(--bg);
            overflow-y: auto;
        }

        .color-cell {
            height: 45px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            cursor: pointer;
            border: 1px solid #333;
            font-weight: bold;
        }

        /* 4. Abas na Base */
        .tabs {
            display: flex;
            background: var(--primary);
            border-top: 2px solid var(--accent);
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: #1e1e1e;
            color: #888;
            font-weight: bold;
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
        }

        /* Cores dos resistores */
        .c-0 { background: #000; color: #fff; } .c-1 { background: #8B4513; color: #fff; }
        .c-2 { background: #ff0000; color: #fff; } .c-3 { background: #ffa500; color: #000; }
        .c-4 { background: #ffff00; color: #000; } .c-5 { background: #008000; color: #fff; }
        .c-6 { background: #0000ff; color: #fff; } .c-7 { background: #800080; color: #fff; }
        .c-8 { background: #808080; color: #fff; } .c-9 { background: #ffffff; color: #000; }
        .c-10 { background: #ffd700; color: #000; } .c-11 { background: #c0c0c0; color: #000; }
    </style>
</head>
<body>

    <div class="resistor-display">
        <div class="resistor-body">
            <div id="b0" class="band c-1"></div>
            <div id="b1" class="band c-0"></div>
            <div id="b2" class="band c-2"></div>
            <div id="b3" class="band c-10"></div>
        </div>
    </div>

    <div class="results">
        <div class="main-value" id="res-val">1.0 kΩ ±5%</div>
        <div class="tolerance-values" id="tol-range">Min: 950 Ω | Max: 1.05 kΩ</div>
    </div>

    <div class="color-selector" id="grid-cores">
        </div>

    <div class="tabs">
        <div class="tab active" onclick="setMode(4)">4 Faixas</div>
        <div class="tab" onclick="setMode(5)">5 Faixas</div>
    </div>

    <script>
        const colors = [
            {n: "Preto", v: 0, m: 1, t: null}, {n: "Marrom", v: 1, m: 10, t: 1},
            {n: "Vermelho", v: 2, m: 100, t: 2}, {n: "Laranja", v: 3, m: 1000, t: null},
            {n: "Amarelo", v: 4, m: 10000, t: null}, {n: "Verde", v: 5, m: 100000, t: 0.5},
            {n: "Azul", v: 6, m: 1000000, t: 0.25}, {n: "Violeta", v: 7, m: 10000000, t: 0.1},
            {n: "Cinza", v: 8, m: null, t: 0.05}, {n: "Branco", v: 9, m: null, t: null},
            {n: "Ouro", v: null, m: 0.1, t: 5}, {n: "Prata", v: null, m: 0.01, t: 10}
        ];

        let mode = 4;
        let selectedBands = [1, 0, 2, 10]; // Índices das cores
        let currentBandIndex = 0; // Qual faixa estamos editando ao tocar na tabela

        function initGrid() {
            const grid = document.getElementById('grid-cores');
            grid.innerHTML = '';
            colors.forEach((c, i) => {
                const cell = document.createElement('div');
                cell.className = `color-cell c-${i}`;
                cell.innerHTML = `<span>${c.n}</span>`;
                cell.onclick = () => selectColor(i);
                grid.appendChild(cell);
            });
        }

        function selectColor(colorIdx) {
            selectedBands[currentBandIndex] = colorIdx;
            // Atualiza cor na imagem
            document.getElementById(`b${currentBandIndex}`).className = `band c-${colorIdx}`;
            
            // Lógica simples de carrossel para as faixas
            currentBandIndex = (currentBandIndex + 1) % mode;
            calculate();
        }

        function calculate() {
            let val = 0;
            let mult = colors[selectedBands[mode-2]].m;
            let tol = colors[selectedBands[mode-1]].t || 20;

            if(mode === 4) {
                val = (colors[selectedBands[0]].v * 10) + colors[selectedBands[1]].v;
            } else {
                val = (colors[selectedBands[0]].v * 100) + (colors[selectedBands[1]].v * 10) + colors[selectedBands[2]].v;
            }

            const finalR = val * mult;
            const min = finalR * (1 - tol/100);
            const max = finalR * (1 + tol/100);

            document.getElementById('res-val').innerText = `${formatR(finalR)}Ω ±${tol}%`;
            document.getElementById('tol-range').innerText = `Min: ${formatR(min)}Ω | Max: ${formatR(max)}Ω`;
        }

        function formatR(num) {
            if(num >= 1000000) return (num/1000000).toFixed(2) + ' M';
            if(num >= 1000) return (num/1000).toFixed(2) + ' k';
            return num.toFixed(1);
        }

        function setMode(m) {
            mode = m;
            currentBandIndex = 0;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active'));
            // Ajustar visual das faixas se necessário (escondido/mostrado)
            calculate();
        }

        initGrid();
        calculate();
    </script>
</body>
</html>
