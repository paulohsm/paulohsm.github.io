<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resistor Pro | IEC 60062</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #151515;
            --text: #e0e0e0;
            --accent: #0366d6;
            --resistor-tan: #d1b48c;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Área do Resistor */
        .display-section {
            padding: 25px 0;
            display: flex;
            justify-content: center;
            background: #111;
            border-bottom: 1px solid #222;
        }

        .terminal { width: 40px; height: 4px; background: #888; align-self: center; }
        .resistor-body {
            width: 180px; height: 46px; background: var(--resistor-tan);
            border-radius: 10px; display: flex; justify-content: space-around;
            padding: 0 10px; border: 2px solid #a88d66; box-shadow: inset 0 0 8px rgba(0,0,0,0.2);
        }
        .band-view { width: 10px; height: 100%; border-radius: 2px; }

        /* Painel de Resultados */
        .results-panel { background: var(--card); padding: 12px 5px; }
        .results-grid {
            display: grid; grid-template-columns: 1fr auto 1fr auto 1fr;
            align-items: center; max-width: 450px; margin: 0 auto;
        }
        .val-unit { font-size: 1.15rem; font-weight: 700; text-align: center; color: #fff; }
        .val-label { font-size: 0.65rem; color: #666; text-align: center; text-transform: uppercase; margin-top: 2px; }
        .divider { color: #333; font-size: 1.2rem; }
        #v-min { color: #ef5350; } #v-max { color: #66bb6a; }

        /* Seletor em Colunas Fixas */
        .selector-container {
            flex: 1; display: grid; background: #000;
        }
        .mode-4 .selector-container { grid-template-columns: repeat(4, 1fr); }
        .mode-5 .selector-container { grid-template-columns: repeat(5, 1fr); }

        .color-column { display: flex; flex-direction: column; border-right: 1px solid #111; }
        .color-option {
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: bold; cursor: pointer; position: relative;
        }
        .color-option.disabled {
            background: #050505 !important; color: #222 !important; pointer-events: none;
        }
        .color-option.selected { outline: 3px solid #fff; outline-offset: -3px; z-index: 5; }

        /* Cores Fixas (Sequência IEC) */
        .c0 { background: #000; color: #fff; } .c1 { background: #8B4513; color: #fff; }
        .c2 { background: #ff0000; color: #fff; } .c3 { background: #ffa500; color: #000; }
        .c4 { background: #ffff00; color: #000; } .c5 { background: #008000; color: #fff; }
        .c6 { background: #0000ff; color: #fff; } .c7 { background: #800080; color: #fff; }
        .c8 { background: #808080; color: #fff; } .c9 { background: #ffffff; color: #000; }
        .c10 { background: #ffd700; color: #000; } .c11 { background: #c0c0c0; color: #000; }
        .c12 { background: #ff69b4; color: #000; } /* Rosa */

        /* Abas */
        .nav-tabs { display: flex; height: 50px; background: #151515; }
        .tab-btn { flex: 1; border: none; background: none; color: #555; font-weight: bold; font-size: 0.9rem; }
        .tab-btn.active { color: var(--accent); background: #1a1a1a; border-top: 3px solid var(--accent); }
    </style>
</head>
<body class="mode-4">

    <div class="display-section">
        <div class="terminal"></div>
        <div class="resistor-body" id="resistor-body"></div>
        <div class="terminal"></div>
    </div>

    <div class="results-panel">
        <div class="results-grid">
            <div><div id="v-min" class="val-unit">-</div><div class="val-label">Mínimo</div></div>
            <div class="divider">|</div>
            <div><div id="v-main" class="val-unit">-</div><div class="val-label">Nominal</div></div>
            <div class="divider">|</div>
            <div><div id="v-max" class="val-unit">-</div><div class="val-label">Máximo</div></div>
        </div>
    </div>

    <div class="selector-container" id="picker"></div>

    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="changeMode(4)">4 FAIXAS</button>
        <button class="tab-btn" onclick="changeMode(5)">5 FAIXAS</button>
    </nav>

    <script>
        const colorNames = ["Preto","Marrom","Vermelho","Laranja","Amarelo","Verde","Azul","Violeta","Cinza","Branco","Dourado","Prata","Rosa"];
        
        // Dados técnicos conforme sequência solicitada
        const mathData = [
            {v: 0, m: 1, t: null},       // Preto
            {v: 1, m: 10, t: 1},        // Marrom
            {v: 2, m: 100, t: 2},       // Vermelho
            {v: 3, m: 1000, t: null},    // Laranja
            {v: 4, m: 10000, t: null},   // Amarelo
            {v: 5, m: 100000, t: 0.5},   // Verde
            {v: 6, m: 1000000, t: 0.25}, // Azul
            {v: 7, m: 10000000, t: 0.1}, // Violeta
            {v: 8, m: null, t: 0.05},    // Cinza
            {v: 9, m: null, t: null},    // Branco
            {v: null, m: 0.1, t: 5},     // Dourado
            {v: null, m: 0.01, t: 10},   // Prata
            {v: null, m: null, t: null}  // Rosa (Reservado)
        ];

        let currentMode = 4;
        let selections = [1, 0, 2, 10, 1]; 

        function changeMode(m) {
            currentMode = m;
            document.body.className = `mode-${m}`;
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i+4) === m));
            render();
        }

        function render() {
            const picker = document.getElementById('picker');
            const body = document.getElementById('resistor-body');
            picker.innerHTML = ''; body.innerHTML = '';

            for (let i = 0; i < currentMode; i++) {
                const bandDiv = document.createElement('div');
                bandDiv.className = `band-view c${selections[i]}`;
                body.appendChild(bandDiv);

                const col = document.createElement('div');
                col.className = 'color-column';
                
                mathData.forEach((data, cIdx) => {
                    const opt = document.createElement('div');
                    const isDigit = i < (currentMode - 2);
                    const isMult = i === (currentMode - 2);
                    const isTol = i === (currentMode - 1);

                    let content = "-";
                    let disabled = false;

                    // Lógica de Desativação
                    if (isDigit) {
                        if (cIdx === 0 && i === 0) disabled = true; // Preto na 1ª faixa
                        if (cIdx >= 10) disabled = true; // Dourado/Prata/Rosa
                        content = disabled ? "-" : data.v;
                    } 
                    else if (isMult) {
                        if (data.m === null) disabled = true;
                        content = disabled ? "-" : "×" + formatMult(data.m);
                    }
                    else if (isTol) {
                        if (data.t === null) disabled = true;
                        content = disabled ? "-" : "±" + data.t + "%";
                    }

                    opt.className = `color-option c${cIdx} ${selections[i] === cIdx ? 'selected' : ''} ${disabled ? 'disabled' : ''}`;
                    opt.innerText = content;
                    
                    if (!disabled) {
                        opt.onclick = () => { selections[i] = cIdx; render(); };
                    }
                    col.appendChild(opt);
                });
                picker.appendChild(col);
            }
            calculate();
        }

        function formatMult(m) {
            if (m >= 1e6) return (m/1e6) + "M";
            if (m >= 1e3) return (m/1e3) + "k";
            return m;
        }

        function calculate() {
            let val = 0;
            const mult = mathData[selections[currentMode - 2]].m;
            const tol = mathData[selections[currentMode - 1]].t || 20;

            if (currentMode === 4) {
                val = (mathData[selections[0]].v * 10) + mathData[selections[1]].v;
            } else {
                val = (mathData[selections[0]].v * 100) + (mathData[selections[1]].v * 10) + mathData[selections[2]].v;
            }

            const nominal = val * mult;
            const min = nominal * (1 - tol/100);
            const max = nominal * (1 + tol/100);

            document.getElementById('v-main').innerText = formatValue(nominal) + " Ω";
            document.getElementById('v-min').innerText = formatValue(min) + " Ω";
            document.getElementById('v-max').innerText = formatValue(max) + " Ω";
        }

        function formatValue(n) {
            if (n >= 1e6) return (n/1e6).toFixed(2) + "M";
            if (n >= 1e3) return (n/1e3).toFixed(2) + "k";
            if (n < 1) return n.toFixed(3);
            return n.toFixed(1);
        }

        render();
    </script>
</body>
</html>
